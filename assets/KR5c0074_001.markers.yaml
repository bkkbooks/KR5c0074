  - {type: variant, offset: 5467, length: 0, content: '', WYG: 心足矣故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然由道言之則雖天地與王皆未足大也然世之人習知三者之大而不信道之大也故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣重為輕根章第二十六重為輕根靜為躁君凡物輕不能載重小不能鎮大不行者使行不動者制動故輕以重為根躁以靜為君是以聖人終日行不離輺重雖有榮觀燕處超然行欲輕而不離輜重榮觀雖樂而必有燕處重靜之不可失如此柰何萬乗之主而以身輕天下人主以身任天下而輕其身則不足以任天下矣輕則失臣躁則失君輕與躁無施而可然君輕則臣知其不足賴臣躁則君知其志于利故曰輕則失臣躁則失君善行無轍迹章第二十七善行無轍迹乘理而行故無迹善言無瑕讁時然後言故言滿天下無口過善計不用籌策萬物之數畢陳于前不計而知安用籌算善閉無關鍵而不可開善結無繩約而不可解全徳之人其于萬物如母之于子雖縱之而不去故無關而能閉無繩而能約是以聖人常善救人故無棄人常善救物故無棄物彼方執䇿以計設關以閉持繩以結其力之所及者少矣聖人之于人非特容之又善救之我不棄人而人安得不歸我乎是謂襲明救人于危難之中非救之大者也方其流轉生死為物所蔽而推吾至明以與之使暗者皆明如燈相傳相襲而不絶則謂善救人矣故善人者不善人之師不善人者善人之資不貴其師不愛其資聖人無心于教故不愛其資天下無心于學故不貴其師聖人非獨吾忘天下能使天下忘我故也雖智大迷是謂要妙聖人之妙雖智者有所不諭也知其雄章第二十八知其雄守其雌為天下谿為天下谿常徳不離復歸于孾兒知其白守其黑為天下式為天下式常徳不忒復歸于無極知其榮守其辱為天下谷為天下谷常徳乃足復歸于朴雄雌先後之及我者也白黒明暗之及我者也榮辱貴賤之及我者也夫欲先而惡後欲明而惡暗欲貴而惡賤物之情也然而先後之及我不若明暗之切明暗之及我不若貴賤之深古之聖人去妄以求復性其性愈明則其守愈下其守愈下則其徳愈厚其徳愈厚則其歸愈大葢不知而不為不若知而不為之至也知其雄守其雌知性者也知性而爭心止則天下之爭先者皆將歸之如水之赴谿莫有去者雖然譬如孾兒能受而未能用也故曰復歸于孾兒知其白守其黑見性者也居暗而視明天下之明者皆不能以形逃也故衆明則之以為法雖應萬物而法未甞差用未甞窮也故曰復歸于無極知其榮守其辱復性者也諸妄已盡處辱而無恨曠兮如谷之虚物來而應之徳足于此純性而無雜矣故曰復歸于朴朴散則為器聖人用之則為官長故大制不割聖人既歸于朴復散朴而為器以應萬物譬如人君分政以立官長亦因其勢之自然雖制而非有所割裂也將欲取天下章第二十九將欲取天下而為之吾見其不得已聖人之有天下非取之也萬物歸之不得已而受之其治天下非為之也因萬物之自然而除其害耳若欲取而為之則不可得之矣天下神器不可為也為者敗之執者失之凡物皆不可為也雖有百人之聚不循其自然而妄為之必有齟齬不服者而況天下乎雖然小物寡衆猶有可以力取而智奪者至于天下之大有神主之不待其自歸則叛不聽其自治則亂矣故物或行或隨或呴或吹或強或羸或載或隳是以聖人去甚去奢去泰隂陽相蕩髙下相傾大小相使或行于前或隨于後或呴而煖之或吹而寒之或益而強之或損而羸之或載而成之或隳而毁之皆物之自然而勢之不免者也然世之愚人私巳而務得乃欲拒而違之其禍不覆則折唯聖人則知其不可逆順以待之去其甚去其奢去其泰使不至于過而傷物而天下無患矣此不為之至也堯湯之于水旱雖不能免而終不至于敗者由此故也易之泰曰后以裁成天地之道輔相天地之宜以左右民三陽在内三隂在外物之泰極矣聖人懼其過而害生故裁成而輔相之使不至于過此所謂去甚去奢去泰也以道佐人主章第三十以道佐人主者不以兵強天下其事好還聖人用兵皆出于不得已而欲以強勝天下雖或能勝其禍必還報之楚靈齊湣秦始皇漢孝武或以殺其身或以禍子孫人之所毒鬼之所疾未有得免之者也師之所處荆棘生焉大軍之後必有凶年兵之所在民事廢故田不脩用兵之後殺氣勝故年榖傷凡兵皆然而況以兵強者善者果而已不敢以取強果決也徳所不能綏政所不能服不得已而後以兵決之耳果而勿矜果而勿伐果而勿驕果而不得已果而勿強勿矜勿伐勿驕不得已四者所以勿強也物壯則老是謂不道不道早已壯之必老物無不然者唯有道者成而若缺盈而若沖未甞壯故未甞老未甞死以兵強天下壯矣能無老乎無死乎夫佳兵章第三十一夫佳兵不祥之器物或惡之故有道者不處以之濟難而不以為常是謂不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬澹為上勝而不美而美之者是樂殺人夫樂殺人者則不可以得志于天下矣吉事尚左凶事尚右偏將軍居左上將軍居右言居上勢則以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之道常無名章第三十二道常無名朴雖小天下不敢臣侯王若能守萬物將自賔樸性也道常無名則性亦不可名矣故其為物舒之無所不在而歛之不盈毫末此所以雖小而不可臣也故匹夫之賤守之則塵垢粃糠足以陶鑄堯舜而侯王之尊不能守則萬物不賔矣天地相合以降甘露民莫之令而自均沖氣升降相合為一而降甘露脗然被萬物無不均徧聖人體至道以應諸有亦如露之無不及者此所以能賔萬物也始制有名名亦既有夫亦將知止知止所以不殆聖人散朴為器因器制名豈其狥名而忘朴逐末而喪本哉葢亦知復于性是以乗萬物而不殆也譬道之在天下猶川谷之於江海也江海水之鍾也川谷水之分也道萬物之宗也萬物道之末也皆水也故川谷歸其所鍾皆道也故萬物賔其所宗知人者智章第三十三知人者智自知者明分别為智蔽盡為明分别之心未除故止于知人而不能自知蔽盡則無分别故能自知而後可以及人也勝人者有力自勝者強力能及人而不能及我能克巳復性則非力之所及故可謂之強也知足者富知足者所遇而足則未甞不富矣雖有天下而常挾不足之心以處之則是終身不能富也強行者有志不與物爭而自強不息物莫能奪其志也不失其所者久物變無窮而心未甞失則久矣死而不亡者壽死生之變亦大矣而其性湛然不亡此古之至人能不生不死者也大道汜兮章第三十四大道汜兮其可左右汜兮無可無不可故左右上下周旋無不至也萬物恃之以生而不辭功成不名有世有生物而不辭者必將名之以為已有世有避物而不有者必將辭物而不生生而不辭成而不有者唯道而已愛養萬物而不為主常無欲可名于小萬物歸焉而不為主可名為大是以聖人終不為大故能成其大大而有為大之心則小矣執大象章第三十五執大象天下往道非有無故謂之大象茍其昭然有形則有同有異同者好之異者惡之好之則來惡之則去不足以使天下皆往矣往而不害安平泰有好有惡則有所利有所害好惡既盡則其于萬物皆無害矣故王者無不安無不平無不泰樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既作樂設餌以待來者豈不足以止過客哉然而樂闋餌盡彼將捨之而去若夫執大象以待天下天下不知好之而況得而惡之乎雖無臭味形色聲音以悦人而其用不可盡矣將欲噏之章第三十六將欲噏之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之是謂微明未甞與之而遽奪則勢有所不極理有所不足勢不極則取之難理不足則物不服然此幾于用智也與管仲孫武何異聖之與世俗其迹固有相似者也聖人乘理而世俗用智乘理如醫藥巧于應病用智如商賈巧于射利柔弱勝剛強聖人知剛強之不足恃故以柔弱自處天下之剛強方相傾相軋而吾獨柔弱以待之及其大者傷小者死而吾以不校坐待其弊此所謂勝也雖然聖人豈有意為此以勝物哉知勢之自然而居其自然耳魚不可脱于淵國之利器不可以示人魚之為利非有爪牙之利足以勝物也方其託于深淵雖強有力者莫能執之及其脱淵而陸則蠢然一物耳何能為哉聖人居于柔弱而剛強者莫能傷非徒莫能傷也又將以前制其後此不亦天下之利器哉魚惟脱于淵然後人得制之聖人惟處于柔弱而不厭故終能服天下此豈與衆人共之者哉道常無為章第三十七道常無為而無不為無所不為而無為之之意耳侯王若能守萬物將自化化而欲作吾將鎮之以無名之朴聖人以無為化物化之始于無為而為而漸至于作譬如孾兒之長人偽日故三代之衰人情之變日以益甚方其欲作而上之人與天下皆靡故其變至有不可勝言者茍其方作而不為之動終以無名之朴鎮之庶幾可得而止也無名之朴亦將不欲不欲以靜天下將自定聖人中無抱朴之念外無抱朴之迹故朴全而用大茍欲朴之心尚存于胷中則失之逺矣老子解卷上}
