  - {type: variant, offset: 5460, length: 5, content: 德眞經註卷, WYG: 之為物惟恍惟惚惚兮恍其中有象恍兮惚其中有物道非有無故以恍惚言之然極其運而成象著而成物未有不出于恍惚者也窈兮㝠兮其中有精方無有之未定恍惚而不可見及夫有無之交則見其窈㝠深眇雖未成形而精存乎其中矣其精甚真其中有信物至於成形則真偽雜矣方其有精不容偽也真偽既雜自一而為二自二而為三紛然錯出不可復信矣方其有精不吾欺也自古及今其名不去以閲衆甫古今雖異而道則不去故以不去名之惟未甞去故能以閲衆有之變矣甫美也雖萬物之美不免于變也吾何以知衆甫之然哉以此聖人之所以知萬物之所以然者以能體道而不去故也曲則全章第二十二曲則全聖人動必循理理之所在或直或曲要于通而已通故與物不迕不迕故全也枉則直直而非理則非直也循理雖枉而天下之至直也窪則盈衆之所歸者下也雖欲不盈不可得矣弊則新昭昭察察非道也悶悶若將弊矣而日新之所自出也少則得道一而已得一則無不得矣多則惑多學而無以一之則惑矣是以聖人抱一為天下式抱一者復性者也葢曲則全枉則直窪則盈弊則新少則得多則惑皆抱一之餘也故以抱一終之不自見故明目不自見故能見物鏡不自照故能照物如使自見自照則自為之不暇而何暇及物哉不自是故彰不自伐故有功不自矜故長夫惟不爭故天下莫能與之爭不自見不自是不自伐不自矜皆不爭之餘也故以不爭終之古之所謂曲則全者豈虚言哉誠全而歸之世以直為是以曲為非將循理而行于世則有不免於曲者矣故終篇復言之曰此豈虚言哉誠全而歸之夫所謂全者非獨全身也内以全身外以全物物我兼全而復于性則其為直也大矣希言自然章第二十三希言自然言出于自然則簡而中非其自然而強言之則煩而難信矣故曰道之出口澹乎其無味視之不足見聽之不足聞用之不可既此之所謂希言矣飄風不終朝驟雨不終日孰為此者天地天地尚不能久而況于人乎隂陽不爭風雨時至不疾不徐盡其勢之所至而後止若夫陽亢于上隂伏于下否而不得洩于是為飄風暴雨若將不勝然其勢不能以終日古之聖人言出于希行出于夷皆因其自然故久而不窮世或厭之以為不若詭辨之悦耳怪行之驚世不知其不能久也故從事于道者道者同于道徳者同于徳失者同于失同于道者道亦樂得之同于徳者徳亦樂得之同于失者失亦樂得之孔子曰茍志于仁矣無惡也志于仁猶若此而況于志于道者乎夫茍從事于道矣則其所為合于道者得道合于徳者得徳不幸而失雖失于所為然必有得于道徳矣信不足焉有不信焉不知道者信道不篤因其失而疑之于是益以不信夫惟知道然後不以得失疑道也者不立章第二十四跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長人未有不能立且行者也茍以立為未足而加之以跂以行為未足而加之以跨未有不喪失其行立者彼其自見自是自矜自伐者亦若是矣其于道也曰餘食贅行譬如飲食適飽則己有餘則病譬如四體適完則己有贅則累物或惡之故有道者不處也有物混成章第二十五有物混成先天地生夫道非清非濁非髙非下非去非來非善非惡混然而成體其于人為性故曰有物混成此未有知其生者葢湛然常存而天地生于其中耳寂兮寥兮獨立而不改周行而不殆可以為天下母寂兮無聲寥兮無形獨立無匹而未甞變行于羣有而未甞殆俯以化育萬物則皆其母矣吾不知其名字之曰道強為之名曰大道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故強為之名曰大然其實則無得而稱之也大曰逝逝曰逺逺曰反自大而求之則逝而往矣自往而求之則逺不及矣雖逝雖逺然反而求}
