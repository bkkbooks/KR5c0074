  - {type: variant, offset: 5458, length: 0, content: '', WYG: 矣大道章第十八大道廢有仁義大道之隆也仁義行於其中而民不知大道廢而後仁義見矣智慧出有大偽世不知道之足以統御萬物也而以智慧加之于是民始以偽報之矣六親不和有孝慈國家昏亂有忠臣六親方和孰非孝慈國家方治孰非忠臣堯非不孝也而獨稱舜無瞽瞍也伊尹周公非不忠也而獨稱龍逄比干無桀紂也涸澤之魚相呴以沫相濡以濕不如相忘于江湖絶聖棄智章第十九絶聖棄智民利百倍非聖智不足以知道使聖智為天下其有不以物者乎然世之人不足以知聖智之本而見其末以為巧勝物者也于是馳騁于其末流而民始不勝其害矣故絶聖棄智民利百倍絶仁棄義民復孝慈未有仁而遺其親者也未有義而後其君者也仁義所以為孝慈矣然及其衰也竊仁義之名以要利于世于是子有違父而父有虐子此則仁義之迹為之也故絶仁棄義則民復孝慈絶巧棄利盜賊無有巧所以便事也利所以濟物也二者非以為盜而盜賊不得則不行故絶巧棄利盜賊無有也此三者以為文不足故令有所屬見素抱樸少私寡欲世之貴此三者以為天下之不安由文之不足故也是或屬之聖知或屬之仁義或屬之巧利葢將以文治之也然而天下益以不安曷不反其本乎見素抱樸少私寡欲而天下各復其性雖有三者無所用之矣故曰我無為而民自化我好靜而民自正我無事而民自富我無欲而民自樸此則聖智之大仁義之至巧利之極也然孔子以仁義禮樂治天下老子絶而棄之或者以為不同易曰形而上者謂之道形而下者謂之器孔子之慮後世也深故示人以器而晦其道使中人以下守其器不為道之所眩以不失為君子而中人以上自是以上逹也老子則不然志于明道夫道不可言可言皆其似者也逹者因偽以識真而昧者執似以陷于大過故後世執老子之言以亂天下者有之而學孔子者無大過因老子之言以逹道者不少而求之于孔子者常苦其無所從入二聖人者皆不得已也全于此必略于彼矣絶學無憂章第二十絶學無憂為學日益為道日損不知性命之正而以學求益増所未聞積之未巳而無以一之則以圜害方以直害曲其中紛然不勝其憂矣患夫學者之至此故曰絶學無憂若夫聖人未甞不學而以道為主不學而不少多學而不亂廓然無憂安用絶學邪唯之與阿相去幾何善之與惡相去何若學者溺于所聞而無以一之則唯之為恭阿之為慢不可同日言矣而況夫善惡之相反乎夫惟聖人知萬物同出于性而皆成于妄如畫馬牛如刻虎彘皆非其實泯焉無是非同異之辨孰知其相去幾何哉茍如此矣則萬物竝育而不相害道竝行而不相悖無足怪矣人之所畏不可不畏聖人均彼我一同異其心無所復留然豈以是忽遺世法犯分亂理而不顧哉人之所畏吾亦畏之人之所為吾亦為之雖列于君臣父子之間行于禮樂刑政之域而天下不知其異也其所以不攖于物者惟心而已荒兮其未央哉人皆狥其所知故介然不出畦畛聖人兼渉有無無入而不可則荒兮其未可央也衆人熈熈如享太牢如春登䑓我獨泊兮其未兆如嬰兒之未孩人各溺于所好其美如享太牢其樂如春登䑓囂然從之而不知其非唯聖人深究其妄遇之泊然不動如孾兒之未能孩也乘乘兮若無所歸乘萬物之理而不自私故若無所歸衆人皆有餘而我獨若遺衆人守其所知各自以為有餘聖人包舉萬物而不主于一超然其若遺也我愚人之心也哉沌沌兮沌沌若愚而非愚也俗人昭昭我獨若昏俗人察察我獨悶悶世俗以分别為智聖人知羣妄之不足辨也故其外若昏其中若悶忽兮若海漂兮若無所止忽然若海不見其津涯漂然無定不見其止宿衆人皆有以而我獨頑且鄙人各有能故世皆得而用之聖人才全徳備若無所施故疑于頑鄙我獨異于人而貴求食于母道者萬物之母衆人狥物忘道而聖人脱遺萬物以道為宗譬如孾兒無所雜食食于母而已孔徳之容章第二十一孔徳之容惟道是從道無形也及其運而為徳則有容矣故徳者道之見自是推之則衆有之容皆道之見于物者}
