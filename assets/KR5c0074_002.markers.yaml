  - {type: line-break, offset: 42, content: '', id: KR5c0074_HFL_002-001a07}
  - {type: variant, offset: 42, length: 0, content: '', WYG: 故順之則治違之則亂治亂之相去其間不能以髪故曰亂之首也前識者道之華而愚之始聖人𤣥覽萬物是非得失畢陳于前如鑑之照形無所不見而孰為前後世人視止于目聽止于耳思止于心㝠行于萬物之間役}
  - {type: variant, offset: 43, length: 2, content: 慧出, WYG: 以求識而偶}
  - {type: variant, offset: 46, length: 0, content: '', WYG: 見焉雖自以為明而不知至愚之自始也是以}
  - {type: variant, offset: 47, length: 1, content: 僞, WYG: 丈夫處其厚不居其薄處其實不居其華故去彼取此世之鄙夫樂其有得于下而忘其上故喜薄而遺厚采華而棄實非大丈夫孰能去彼取此昔之得一者章第三十九昔之得一者天得一以清地得一以寜神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞一道也物之所以得為物者皆道也天下之人見物而忘道天知其清而已地知其寧而已神知其靈而已谷知其盈而已萬物知其生而已侯王知其為天下貞而已不知其所以得此者皆道存焉耳其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貞而貴髙將恐蹶致之言極也天不得一未遽裂也地不得一未遽發也神不得一未遽歇也萬物不得一未遽滅也侯王不得一未遽蹶也然其極必至此耳故貴以賤為本高以下為基天地之大侯王之貴皆一之致夫一果何物也視之不見執之不得則亦天地之至微也此所謂賤且下也是以侯王自謂孤寡不穀此其以賤為本耶非乎昔之為此稱者亦舉其本而遺其末耳故致數車無車不欲琭琭如玉落落如石輪輻蓋軫衡軛轂轊㑹而為車物物可數而車不可數然後知無有之為車所謂無之以為用者也然則天地將以大為天地耶侯王將以貴為侯王耶大與貴之中有一存焉此其所以為天地侯王者而莫或知之耳故一處貴而非貴處賤而非賤非若玉之琭琭貴而不能賤石之落落賤而不能貴也反者道之動章第四十反者道之動復性則靜矣然其寂然不動感而遂通天下之故則動之所自起也弱者道之用道無形無聲天下之弱者莫如道然而天下之至强莫加焉此其所以能用萬物也天地萬物生于有有生于無}
