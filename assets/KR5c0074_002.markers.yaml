  - {type: variant, offset: 162, length: 0, content: '', WYG: 四}
  - {type: variant, offset: 163, length: 12, content: 九絶聖棄智民利百倍非聖智, WYG: 一上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑}
