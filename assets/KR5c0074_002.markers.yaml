  - {type: variant, offset: 500, length: 0, content: '', WYG: 世俗所謂悶悶也治人事天章第五十九治人事天莫若嗇夫惟嗇是謂早服早服謂之重積德重積徳則無不剋無不剋則莫知其極莫知其極可以有國有國之母可以長久凡物方則割廉則劌直則肆光則耀唯}
  - {type: page-break, offset: 500, content: '', id: KR5c0074_WYG_002-24b, image: WYG1055/WYG1055-0225b.png}
  - {type: variant, offset: 501, length: 1, content: 智, WYG: 人方而不割廉而不劌直而不肆光而不耀此謂嗇也夫嗇者有而不用者也世患無以服人茍誠有而能嗇雖未甞與物較而物知其非不能也則其服之早矣物既已服斂藏而用至于沒身而終不試則徳重積矣徳積既厚雖天下之剛强無不能剋則物莫測其量矣如此而後可以有國彼世之小人有尺寸之柄而輕用之一試不服天下測知其深淺而爭犯之雖欲保其國家不可得也吾是以知嗇之可以有國可以有國則有國之母也是謂深根固長生久視之道孟子曰存其心養其性所以事天也以嗇治人則可以有國者是也以嗇事天則深根固者是也古之聖人保其性命之常不以外耗内則根深而不可拔固而不可脱雖以長生久視可也蓋治人事天雖有内外之異而莫若嗇則一也治大國章第六十治大國若烹小鮮烹小鮮者不可撓治大國者不可煩煩則人勞撓則魚爛以道莅天下其鬼不神聖人無為使人各安其自然外無所煩内無所畏則物莫能侵雖鬼無所用神矣非其鬼不神其神不傷人非其神不傷人聖人亦不傷人非其鬼之不神亦有神而不傷人耳非神之不傷人聖人未甞傷人故其鬼無能為耳夫兩不相傷故徳交歸焉人鬼所以不相傷者由上有聖人耳故德交歸}
