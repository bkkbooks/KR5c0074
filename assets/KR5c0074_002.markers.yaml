  - {type: variant, offset: 204, length: 1, content: 智, WYG: 人以天下觀天下亦若吾}
  - {type: variant, offset: 206, length: 1, content: 本, WYG: 以身觀身乎豈身可以身觀而天下獨不可以天下觀乎故曰吾何以知天下之然哉以此言亦以身知之耳含德之厚章第五十五含德之厚比于赤子老子之言道德每以孾兒況之者皆言其體而已未及其用也夫孾兒泊然無欲其體則至矣然而物來而不知應故未可以言用也毒蟲不螫猛獸不據攫鳥不搏道無形體物莫得}
  - {type: page-break, offset: 206, content: '', id: KR5c0074_WYG_002-20a, image: WYG1055/WYG1055-0223a.png}
  - {type: variant, offset: 209, length: 0, content: '', WYG: 也況可得而傷之乎人之所以至于有形者由}
  - {type: variant, offset: 210, length: 1, content: 末, WYG: 有心也故有心而後有形有形而後有敵敵立而傷之者至矣無心之人物無與敵者而曷由傷之夫赤子所}
  - {type: page-break, offset: 210, content: '', id: KR5c0074_WYG_002-20b, image: WYG1055/WYG1055-0223b.png}
  - {type: variant, offset: 212, length: 1, content: 爲, WYG: 至此者唯無心也骨弱筋柔而握固未知牝牡之合而䘒作精之至也無執而自握無欲而自作是}
  - {type: variant, offset: 214, length: 2, content: 巧勝, WYG: 知其精有餘而非心也終日號而嗌不嗄和之至也心動則氣傷氣傷則號而啞終日號而不啞是以知其心不動而氣和也知和曰常和者不以外傷内也復命曰常遇物而知反其本者也知和曰常得本以應萬}
  - {type: page-break, offset: 214, content: '', id: KR5c0074_WYG_002-21a, image: WYG1055/WYG1055-0223c.png}
  - {type: variant, offset: 219, length: 1, content: 於, WYG: 其實一道也故皆謂之常知常曰明益生曰祥生不可益而欲益之則非其正矣祥妖也心使氣曰强氣惡妄作而又以心使之則强梁甚矣物壯將老謂之不道不道早已益生使氣不能聽其自然日入于剛强而老從之則失其赤子之性矣知者不言章第五十六知者不言言者不知塞其兑閉其門挫其鋭解其紛和其光同其塵}
