  - {type: variant, offset: 5515, length: 4, content: 聖人乗理, WYG: 凡此皆老子之所以為書與其所以為道之大略也故于終篇復言之題老子道德經後予年四十有二謫居筠州筠雖小州而多古禪刹四方遊僧聚焉有道全者住黄蘖山南公之孫也行髙而心通喜從予遊甞與予譚道子告之曰子所譚者予于儒書已得之矣全曰此佛法也儒者何自得之予曰不然予忝聞道儒者之所無何苦强以誣之顧誠有之}
