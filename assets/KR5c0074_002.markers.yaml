  - {type: variant, offset: 4271, length: 64, content: 所處荆棘生焉大軍之後必有凶年兵之所在民事廢故田不修用兵之後殺氣勝故年穀傷凡兵皆然而況以兵强天下者耶故善者果而己不敢以取强果决也德, WYG: 無}
