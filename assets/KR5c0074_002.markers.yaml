  - {type: variant, offset: 5725, length: 6, content: 哉魚惟脱於淵, WYG: 致中和天地位焉萬物育焉此非佛法而何顧所從言之異耳全曰何以言之予曰六祖有言不思善不思惡方云是時也孰是汝本來面目自六祖以來人以此言悟入者大半矣所謂不思善不思惡則喜怒哀樂之未發也蓋中者佛性之異名而和者六度萬行之總目也致中極和而天地萬物生于其間此非佛法何以當之全驚喜曰吾初不知也今而後始知儒佛一法也予笑曰不}
