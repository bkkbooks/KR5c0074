  - {type: variant, offset: 202, length: 0, content: '', WYG: 取天下人皆有欲取天下之心故造事而求之心見于外而物惡之故終不可得聖人無為故無事其心見于外而物安之雖不取天下而天下歸之矣聖人無常心章第四十九聖人無常心以百姓之心為心善者吾善之不善者吾亦善之德善信者吾信之不信者吾亦信之德信虚空無形因萬物之形以為形在方為方在圓為圓如使空自有形則何以形萬物哉是以聖人無心因百姓之心以為心無善不善皆善之無信不信皆信之善不善在彼吾之所以善之者未甞渝也可謂徳善矣信不信在彼而吾之所以信者未甞變也可謂德信矣不然善善而棄不善信信而棄不信豈所謂常善救人故無棄人哉聖人在天下惵惵為天下渾其心百姓皆注其耳目聖人皆孩之天下善惡信偽方各自是以相非相賊不知所定聖人憂之故惵惵為天下渾其心無善惡無信偽皆以一待之彼方注其耳目以觀聖人之與奪而吾一以孾兒遇之于善無所喜于惡無所嫉夫是以善者不矜惡者不慍釋然皆化而天下始定矣出生入死章第五十出生入死性無生死出則為生入則為死生之徒十有三死之徒十有三人之生動之死地亦十有三用物取精以自滋養者生之徒也聲色臭味以自戕賊者死之徒也二者既分生死之道矣吾又知作而不知休知言而不知黙知思而不知忘以于盡則所謂動而之死地者也生死之道以十言之三者各居其三矣豈非生死之道九而不生不死之道一而已矣不生不死則易所謂寂然不動者也老子言其九不言其一使人自得之以寄無思無為之妙也夫何故以其生生之厚有生則有死故生之徒即死之徒也人之所賴于生者厚則死之道常十九蓋聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地聖人常在不生不死中生地且無焉有死地哉道生之章第五十一道生之德畜之物形之勢成之道者萬物之母故生萬物者道也及其運而為徳牧養羣衆而不辭故畜萬物者徳也然而道德則不能自形因物而後形見物則不能自成逺近相取剛柔相交積而為勢而後興亡治亂之變成矣是以萬物莫不尊道而貴徳形雖由物成雖由勢而非道不生非德不畜是以尊道而貴德尊如父兄貴如侯王道無位而德有名故也道之尊德之貴夫莫之命一作爵而常自然恃爵而後尊貴者非實尊貴也故道生之德畜之長之育之成之熟之養之覆之生而不有為而不恃長而不宰是謂𤣥德天下有始章第五十二天下有始以為天下母無名天地之始有名萬物之母道方無名則物之所資始也及其有名則物之所資生也故謂之始又謂之母其子則萬物也既知一作得其母復一作以知其子既生其子復守其母沒身不殆聖人體道以周物譬如以母知其子了然無不察也雖其智能周之然而未甞以物忘道故終守其母也塞其兑閉其門終身不勤開其兑濟其事終身不救天下皆具此道然常患忘道而徇物目悦于色耳悦于聲開其悦之之心而以其事濟之是以終身而陷溺不能救夫聖人之所以終身不勤者唯塞而閉之未甞出而徇之也見小曰明悦之為害始小而浸大知小之將大而閉之可謂明矣守柔曰强趨其所悦而不顧自以為强而非强也唯見悦而知畏之者可謂强矣用其光復歸其明無遺身殃是謂習一作襲常世人開其所悦以身徇物往而不反聖人塞而閉之非絶物也以神應物用其光而已身不與也夫耳之能聽目之能見鼻之能臭口之能甞身之能觸心之能思皆所謂光也蓋光與物接物有去而明無損是以應萬變而不窮殃不及于其身故其常性湛然相襲而不絶矣使我介然章第五十三使我介然有知行于大道唯施是畏體道者無知無行無所施設而物自化今介然有知而行于大道則有施設建立非其自然有足畏者矣大道甚夷而民好徑大道夷易無有險阻世之不知者以為迂逺而好徑以求捷故凢舍其自然而有所施設者皆欲速者也朝甚除田甚蕪倉甚虚服文綵𢃄利劍厭飲食財貨有餘是謂盜夸非道哉俗人昭昭我獨若昏俗人察察我獨悶悶豈復飾末廢本以施設為事夸以誨盜哉善建不拔章第五十四善建者不拔善抱者不脱子孫祭祀不輟世豈有建而不拔抱而不脱者乎唯聖人知性之眞審物之妄捐物而脩身其徳充積實無所立而其建有不可拔者實無所執而其抱有不可脱者故至其子孫猶以祭祀不輟也脩之于身其德乃眞脩之于家其德有餘脩之于鄉其德乃長脩之于邦其德乃豐脩之于天下其德乃普身既脩推其餘以及外雖至于治天下可也故以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾何以知天下之然哉以此天地外者世俗所不見矣然其理可推而知也脩身之至以身觀身以家觀家以鄉觀鄉以邦觀邦皆吾之所及知也然安}
