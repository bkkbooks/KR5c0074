  - {type: line-break, offset: 12, content: '', id: KR5c0074_HFL_002-001a04}
  - {type: variant, offset: 12, length: 3, content: 大道廢, WYG: 上德不德是以}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 德下德不失德是以無德聖人從心所欲不踰矩非有意于德而德自足其下知徳之貴勉强以求不失蓋僅自完耳而何德之有上德無為而無以為下德為之而有以為無為而有以為之則猶有為也唯無為而無以為者可謂無為矣其下非為不成然猶有以為之非徒作而無術者也上仁為之而無以為上義為之而有以為}
  - {type: page-break, offset: 16, content: '', id: KR5c0074_WYG_002-1b, image: WYG1055/WYG1055-0213b.png}
