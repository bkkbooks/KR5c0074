  - {type: variant, offset: 4376, length: 6, content: 勿矜勿伐勿驕, WYG: 萬物草木之生也柔脆其死也枯槁故堅强者死之徒柔弱者生之徒沖氣在焉則體無堅强之病至理在焉則事無堅强之累是以兵强則}
