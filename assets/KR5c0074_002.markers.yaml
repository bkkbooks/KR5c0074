  - {type: variant, offset: 5191, length: 0, content: '', WYG: 為而不恃功成而不處其不欲見賢耶為而恃成而處則賢見于世賢見于世則是以有餘自奉也天下柔弱章第七十八天下柔弱莫過于水而攻堅强者莫之能勝其無以易之弱之勝强柔之勝剛天下莫不知莫能行故聖人云受國之垢是謂社稷主受國之不祥是謂天下王正言若反正言合道而反俗俗以受垢為辱受不祥為殃故也和大怨章第七十九和大怨必有餘怨安以為善夫怨生于妄而妄出于性知性者不見諸妄而又何怨乎今不知除其本而欲和其末故外雖和而内未忘也是以聖人執左契而不責于人有徳司契無徳司徹契之有左右所以為信而息爭也聖人與人均有是性人方以妄為常馳騖于爭奪之塲而不知性之未始少妄也是以聖人以其性示人使知除妄以復性待其妄盡而性復未有不廓然自得如右契之合左不待責之而自服也然則雖有大怨懟將渙然氷解知其本非有矣而安用和之彼無徳者乃欲人人而通之則亦勞而無功矣徹通也天道無親常與善人天道無私惟善人則與之契之無私也小國寡民章第八十小國寡民老子生于衰周文勝俗弊將以無為救之故于書之}
