  - {type: variant, offset: 4613, length: 507, content: 物將自賔樸性也道常無名則性亦不可名矣故其爲物舒之無所不在而歛之不盈毫末此所以雖小而不可臣也故匹夫之賤守之則塵垢粃糠足以陶鑄堯舜而侯王之尊不能守則萬物不賔矣天地相合以降甘露人莫之令而自均沖氣升降相合爲一而降甘露脗然被於萬物無不均遍聖人體至道以應諸有亦露之無不及者此所以能賔萬物也始制有名名亦既有夫亦將知止知止所以不殆聖人散樸爲器因器制名豈其徇名而忘樸逐末而喪本哉蓋亦知復於性是以乗萬變而不殆也譬道之在天下猶川谷之與江海江海水之鍾也川谷水之分也道萬物之宗也萬物道之末也皆水也故川谷歸其所鍾皆道也故萬物賔其所宗知人者智章第三十三知人者智自知者明分别爲知蔽盡爲明分别之心未除故止於知人而不能自知蔽盡則無復分别故能自知而又可以及人也勝人者有力自勝者强力能及人而不能及我能克己復性則非力之所及故可謂强矣知足者富知足者所遇而足則未嘗不富矣雖有天下而常挾不足之心以處之則是終身不能富也强行者有志不與物爭而自强不息物莫能奪其志也不失其所者乆物變無窮而心未嘗失則乆矣死而不亡者壽死生之變亦大矣而其性湛然不亡此古之至人能不生不死者也大道汎兮章第三十四大道汎兮其可左右汎兮無可無不可故左右上下周旋無不至也萬物恃之以生而不辭功成不名有世有生, WYG: ''}
