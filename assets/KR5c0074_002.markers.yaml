  - {type: indent, offset: 4347, content: 　, id: KR5c0074_krp_002-bkkind260}
  - {type: variant, offset: 4349, length: 0, content: '', WYG: 戰若出于怒是}
  - {type: variant, offset: 4350, length: 0, content: '', WYG: 我故殺人也天必殃之善勝敵者不爭以吾不爭故能勝彼之爭若皆出于爭則未必勝矣善用人者為下人皆有相上之心故莫能相為用誠能下之則天下皆吾用也是謂不爭之徳是謂用人之力是謂配天古之極用}
  - {type: page-break, offset: 4350, content: '', id: KR5c0074_WYG_002-34b, image: WYG1055/WYG1055-0230b.png}
  - {type: variant, offset: 4351, length: 1, content: 决, WYG: 有言章第六十九用兵有言吾不敢為主而為客主造事者也客應敵者也不敢進寸而退尺進者有意于爭者也退者無意于爭者也是謂行無行無意于爭則雖用兵與不用均也攘無臂仍無敵執無兵茍無意于爭則雖在軍旅如無臂可攘無敵可因無兵可執而安有用兵}
  - {type: page-break, offset: 4351, content: '', id: KR5c0074_WYG_002-35a, image: WYG1055/WYG1055-0230c.png}
  - {type: variant, offset: 4353, length: 0, content: '', WYG: 咎耶禍莫大于輕敵輕敵幾喪吾寶聖人以慈為寶輕敵則輕戰輕戰則輕殺人喪其所以為慈矣故抗兵相加哀者勝矣兩敵相加而吾出于不得已則有哀心哀心見而天人助之雖欲不勝不可得矣吾言甚易知章第七十吾言甚易知甚易行天下莫能知莫能行道之大復性而足而性之妙見于起居飲食之間}
  - {type: page-break, offset: 4353, content: '', id: KR5c0074_WYG_002-35b, image: WYG1055/WYG1055-0230d.png}
  - {type: 'kr:newline', offset: 4354, content: '

      ', id: KR5c0074_krp_002-bkkkrnewl380}
  - {type: line-break, offset: 4354, content: '', id: KR5c0074_HFL_002-018a07}
  - {type: variant, offset: 4354, length: 1, content: 果, WYG: 聖人指此以示人豈不易知乎人能體此以應物豈不易行乎然世常患日用}
  - {type: variant, offset: 4356, length: 3, content: 勿矜果, WYG: 不知知且不能}
  - {type: variant, offset: 4360, length: 3, content: 勿伐果, WYG: 況行之乎言有宗事有君夫唯無知是以不我知言者道之筌也事者道之迹也使道可以言盡則聽言}
  - {type: page-break, offset: 4360, content: '', id: KR5c0074_WYG_002-36a, image: WYG1055/WYG1055-0231a.png}
  - {type: variant, offset: 4364, length: 3, content: 勿驕果, WYG: 足矣可以事見則考事而足矣唯言不能盡事不能見非舍言而求其宗遺事而求其君不可得也蓋古之聖人無思無為而有漠然不自然不自知者存焉此則思慮之不及是以終莫吾知也知我者希則我貴衆人之所能知亦不足貴矣是以聖人被褐懷玉聖人外與人同而中獨異耳知不知章第七十一知不知上不知知病道非思慮之所及故不可知然方其未知則非知無以入也及其既知而存知則病矣故知而不知者上不知而知者病夫唯病病是以不病既不可不知又不可知唯知知為病者久而病自去矣聖人不病以其病病是以不病民不畏威章第七十二民不畏威大威至矣夫性自有威髙明光大赫然物莫能加此所謂大威也人常患溺于衆妄畏生死而憚得喪萬物之威雜然乘之終身惴惴之不暇雖有大威而不自知也茍誠知之一生死齊得喪坦然無所怖畏則大威然見于前矣無狹其所居無厭其所生夫唯不厭是以不厭性之大可以包絡天地彼不知者以四肢九竅為巳也守之而不厭是以見不出視聞不出聽蕞然其甚陋也故教之曰無狹其所居彼知之者知性之大而吾生之狹也則愀然厭之欲脱}
  - {type: page-break, offset: 4364, content: '', id: KR5c0074_WYG_002-36b, image: WYG1055/WYG1055-0231b.png}
  - {type: page-break, offset: 4364, content: '', id: KR5c0074_WYG_002-37a, image: WYG1055/WYG1055-0231c.png}
  - {type: page-break, offset: 4364, content: '', id: KR5c0074_WYG_002-37b, image: WYG1055/WYG1055-0231d.png}
  - {type: variant, offset: 4370, length: 0, content: '', WYG: 不知有厭有慕之方圓于物也故教之曰無厭其所生夫唯聖人不狹不厭與人同生而與道同居無廣狹淨穢之辨既不厭生而後知生之無可厭也是以聖人自知不自見自愛不自貴故去彼取此聖人雖自知之而不自見雖自愛之而不自貴以眩人恐人之有厭有慕也厭慕之心未忘則猶有畏也畏去而後大威至也勇于敢章第七十三勇于敢則殺勇于不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之勇于敢則死勇于不敢則生此物理之常也然而敢者或以得生不敢者或以得死世遂僥倖其或然而忽其常理夫天道之逺其有一或然者孰知其好惡之所從來哉故雖聖人猶以常為正其于勇敢未甞不難之列子曰迎天意揣利害不如其}
  - {type: page-break, offset: 4370, content: '', id: KR5c0074_WYG_002-38a, image: WYG1055/WYG1055-0232a.png}
  - {type: page-break, offset: 4370, content: '', id: KR5c0074_WYG_002-38b, image: WYG1055/WYG1055-0232b.png}
  - {type: 'kr:newline', offset: 4371, content: '

      ', id: KR5c0074_krp_002-bkkkrnewl381}
  - {type: line-break, offset: 4371, content: '', id: KR5c0074_HFL_002-018a08}
  - {type: variant, offset: 4371, length: 0, content: '', WYG: 患天道之難知}
  - {type: variant, offset: 4372, length: 1, content: 果, WYG: 以歴陳之也天之道不爭}
  - {type: variant, offset: 4374, length: 1, content: 勿, WYG: 善勝不與物爭于一時要于終勝之而已不言而善應天何言哉四時行焉百物生焉未有求而不應者也不召而自來神之格思不可度思矧可射思夫誰召之哉繟然而善謀繟然舒緩若無所營而其謀度非人之所及也天網恢恢疎而不失世以耳目觀天見其一曲而不睹其大全有以善而得禍惡而得福者未有不疑天網之疎而多失也惟能要其終始而盡其變化然後知其恢恢廣大雖疎而不失也民不畏死章第七十四民不畏死柰何以死懼之政煩刑重民無所措手足則常不畏死雖以死懼之無益也若使民常畏死而為奇者吾得執而殺之孰敢民安于政常樂生畏死然後執其詭異亂羣者而殺之孰敢不服哉常有司殺者殺司殺者天也方世之治而有詭異亂羣之人恣行于其間則天之所棄也而吾殺之則是天殺之而非我也夫代司殺者殺是謂代大匠斵夫代大匠斵者希有不傷手矣非天之所殺而吾自殺之是代司殺者殺也代大匠斵則傷其手矣代司殺者殺則及其身矣民之饑章第七十五民之饑以其上食税之多是以饑民之難治以其上之有為是以難治上以有為導民民亦以有為應之故事多而難治民之輕死以其求生之厚是以輕死上以利欲先民民亦爭厚其生故雖死而求利不厭夫唯無以生為者是賢于貴生貴生之極必至于輕死惟無以生為而生自全矣人之生章第七十六人之生也柔弱其死也堅}
  - {type: page-break, offset: 4374, content: '', id: KR5c0074_WYG_002-39a, image: WYG1055/WYG1055-0232c.png}
