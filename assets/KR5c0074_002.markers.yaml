  - {type: variant, offset: 497, length: 1, content: 樸, WYG: 朴其政悶悶章第五十八其政悶悶其民醇醇其政察察其民缺缺禍兮福之所倚福兮禍之所伏孰知其極其無止正復為奇善復為妖人之迷其日固久天地之大世俗之見有所眩而不知也蓋福倚于禍禍伏于福譬如老穉生死之相繼未始有止而迷者不知也夫惟聖人出于萬物之表而攬其終始得其大全而遺其小察視之悶悶若無所明而其民醇醇各全其性矣若夫世人不知道之全體以耳目之所知為至彼方且自以為福而不知禍之伏于後方且自以為善而不知妖之起于中區區以察為明至于察甚傷物而不悟其非也可不哀哉是以聖人方而不割廉而不劌直而不肆光而不耀知小察之不能盡物是以雖能方能廉能直能光而不用其能恐其陷于一偏而不反也}
