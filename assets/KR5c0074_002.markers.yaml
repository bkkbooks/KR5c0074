  - {type: variant, offset: 52, length: 108, content: 之足以澹足萬物也而以智慧加之於是民始以僞報之矣六親不和有孝慈國家昏亂有忠臣六親方和孰非孝慈國家方治孰非忠臣堯非不孝也而獨稱舜無瞽叟也伊尹周公非不忠也而獨稱龍逄比千無桀紂也涸澤之魚相呴以沬相濡以溼不如相忘於江湖絶聖棄智, WYG: ''}
