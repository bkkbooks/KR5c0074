  - {type: indent, offset: 18, content: 　, id: KR5c0074_krp_002-bkkind3}
  - {type: variant, offset: 18, length: 2, content: 大道, WYG: 皆不免于為}
  - {type: variant, offset: 21, length: 2, content: 隆也, WYG: 矣其所以異者仁以無以為為勝義以有以為為功耳德有上下而}
  - {type: variant, offset: 25, length: 4, content: 行於其中, WYG: 有上無下何也下德在仁義之間}
  - {type: variant, offset: 30, length: 0, content: '', WYG: 仁義之下者不足復言故也上禮為之而莫之應則攘臂而仍之自徳以降而至于禮聖人之所以齊}
  - {type: page-break, offset: 30, content: '', id: KR5c0074_WYG_002-2a, image: WYG1055/WYG1055-0214a.png}
  - {type: variant, offset: 31, length: 0, content: '', WYG: 者極矣故為之而}
  - {type: variant, offset: 32, length: 1, content: 知, WYG: 應則至于攘臂而强之强之而又不應于是刑罰興而兵甲起則徒作而無術矣故失}
