  - {type: page-break, offset: 2214, content: '', id: KR5c0074_SJB_002-120302a, image: sjb/12/120302a.png}
  - {type: variant, offset: 2225, length: 1495, content: 不窮世或厭之以爲不若詭辯之悦耳怪行之驚世不知其不能乆也故從事於道者道者同於道德者同於德失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之孔子曰苟志於仁矣無惡也故曰仁者之過易辭志於仁猶若此而況志於道者乎夫苟從事於道矣則其所爲合於道者得道合於德者得德不幸而失雖失於所爲然必有得於道德矣信不足有不信不知道者信道不篤因其失而疑之於是益以不信失惟知道然後不以得失疑道也跂者不立章第二十四跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長人未有不能立且行者也苟以立爲未足而加之以跂以行爲未足而加之以跨未有不喪失其行立者彼其自見自是自伐自矜者亦若是矣其於道也曰餘食贅行譬如飲食適飽則已有餘則病譬如四體適完則已有贅則累物或惡之故有道者不處有物混成章第一一十五有物混成先天地生夫道非清非濁非高非下非去非來非善非惡混然而成體其於人爲性故曰有物混成此未有知其生者蓋湛然常存而天地生於其中耳寂兮寥兮獨立而不改周行而不殆可以爲天下母寂兮無聲寥兮無形獨立無匹而未嘗變行於群有而未嘗殆俯以化育萬物則皆其母矣吾不知其名字之曰道强爲之名曰大道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故强爲之名曰大然其實則無得而稱之也大曰逝逝曰遠遠曰反自大而求之則逝而往矣自往而求之則遠不及矣雖逝雖遠然反而求之一心足矣故道大天大地大王亦大域中有四大而王居一焉人法地地法天天法道道法自然由道言之則雖天地與王皆不足大也然世之人習知三者之大而不信道之大也故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣重爲輕根章第二十六重爲輕根靜爲躁君凡物輕不能載重小不能鎮大不行者使行不動者制動故輕以重爲根躁以靜爲君是以君子終日行不離輜重雖有榮觀燕處超然行欲輕而不離輜重榮觀雖樂而必有燕處重靜之不可失如此奈何萬乗之主而以身輕天下人主以身任天下而輕其身則不足以任天下矣輕則失臣躁則失君輕與躁無施而可然君輕則臣知其不足賴臣躁則君知其志於利故曰輕則失臣躁則失君善行無轍迹章第二十七善行無轍迹乗理而行故無迹善言無瑕謫時然後言故言滿天下無口過善計不用籌筭萬物之數畢陳於前不計而知安用籌筭善閉無關楗而不可開善結無繩約而不可解全德之人其於萬物如母之於子雖縱之而不去故無關而能閉無繩而能約是以聖人常善救人故無棄人常善救物故無棄物彼方執筭以計設關以閉持繩以結其力之所及者少矣聖人之於人非特容之又善救之我不棄人而人安得不歸我乎是謂襲明救人於危難之中非救之大者也方其流轉生死爲物所蔽而推吾至明以與之使暗者皆明如燈相傳相襲而不絶則可謂善救人矣故善人不善人之師不善人善人之資不貴其師不愛其資聖人無心於教故不愛其資天下無心於學故不貴其師聖人非獨吾忘天下亦能使天下忘我故也雖智大迷是謂要妙聖人之妙雖智者有所不諭也知其雄章第二十八知其雄守其雌爲天下谿爲天下谿常德不離復歸於嬰兒知其白守其黑爲天下式爲天下式常德不忒復歸於無極知其榮守其辱爲天下谷爲天下谷常德乃足復歸於樸雄雌先後之及我者也白黑明闇之及我者也榮辱貴踐之及我者也夫欲先而惡後欲明而惡闇欲貴而惡賤物之情也然而先後之及我不若明闇之切明闇之及我不若貴賤之深古之聖人去妄以求復性其性愈明則其守愈下其守愈下則其德愈厚其德愈厚則其歸愈大蓋不知而不爲不若知而不爲之至也知其雄守其雌知性者也知性而爭心止則天下之爭先者皆將歸之如水之赴谿莫有去者雖然譬如嬰兒能受而未能用也故曰復歸於嬰兒知其白守其黑見性者也居闇而視明天下之明者皆不能以形逃也故衆明則之以爲法雖應萬物而法未嘗差用未嘗窮也故曰復歸於無極知其榮守其辱復性者也諸妄已盡處辱而無憾曠兮如谷之虚物來而應之德足於此純性而無雜矣故曰復歸於樸樸散則爲, WYG: 為}
