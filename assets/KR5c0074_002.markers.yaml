  - {type: variant, offset: 34, length: 2, content: 既廢, WYG: 而後徳失徳}
  - {type: variant, offset: 39, length: 0, content: '', WYG: 失仁而後}
  - {type: variant, offset: 40, length: 0, content: '', WYG: 失義而後禮夫禮者忠信之薄而亂之首忠信而無禮則忠信不}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 禮立而忠信之美發越於外君臣父子之間夫婦朋友之際其外燦然而中無餘}
  - {type: page-break, offset: 41, content: '', id: KR5c0074_WYG_002-2b, image: WYG1055/WYG1055-0214b.png}
  - {type: 'kr:newline', offset: 42, content: '

