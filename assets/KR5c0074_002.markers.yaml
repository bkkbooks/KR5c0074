      ', id: KR5c0074_krp_002-bkkkrnewl19}
  - {type: line-break, offset: 188, content: '', id: KR5c0074_HFL_002-001b09}
  - {type: indent, offset: 188, content: 　, id: KR5c0074_krp_002-bkkind14}
  - {type: variant, offset: 188, length: 0, content: '', WYG: 餘以貸}
  - {type: variant, offset: 189, length: 0, content: '', WYG: 足物之頼之}
  - {type: variant, offset: 190, length: 0, content: '', WYG: 成者如此}
  - {type: variant, offset: 191, length: 1, content: 御, WYG: 生一章第四十二道生一一生二二生三三生萬}
  - {type: variant, offset: 193, length: 0, content: '', WYG: 萬物負隂而抱陽沖氣以為和夫道非一非二及其與物為偶道一而物不一故以一名道然而道則非一也一與一為二二與一為三自是以徃而萬物生物雖有萬不同而莫不負隂抱陽沖氣以為和}
  - {type: page-break, offset: 193, content: '', id: KR5c0074_WYG_002-8a, image: WYG1055/WYG1055-0217a.png}
  - {type: variant, offset: 194, length: 1, content: 乎, WYG: 蓋物生于三而三生于一理之自}
  - {type: variant, offset: 196, length: 0, content: '', WYG: 也人之所惡唯孤寡不穀而王公以為稱}
  - {type: variant, offset: 200, length: 0, content: '', WYG: 知萬物之所自生莫不賤寡小而貴重大然王公之尊而自稱孤寡不穀古之達者蓋巳知之矣故或損之而益或益之而損人之所教我亦教之强梁者不得其死吾將以為教父天下之至柔章第四十三天下之至柔馳騁天下之至堅無有入無間吾是以知無為之有益以堅御堅不折則碎以柔御堅柔亦不靡堅亦不病求之于物則水是也以有入有捍不相受以無入有無未甞勞有未甞覺求之于物則鬼神是也是以聖人唯能無為故能役使衆强出入羣有不言之教無為之益天下希及之名與身章第四十四名與身孰親身與貨孰多先身而後名貴身而賤貨猶未為忘我也忘我者身不有而況于名與貨乎然貴以身為天下非忘我不能故使天下知名之不足親貨之不足多而後知貴身知貴身而後知忘我此老子之意也得與亡孰病不得者以亡為病及其既得而患失則病又有甚于亡者惟齊有無均得喪而後無病也甚愛必大費多藏必厚亡愛甚則凡可以求之者無所不為能無費乎藏之多則攻之者必衆能無亡乎知足不辱知止不殆可以長久大成若缺章第四十五大成若缺其用不弊大盈若沖其用不窮天下以不缺為成故成必有弊以不虚為盈故盈必有窮聖人要于大成而不䘏其缺期于大盈而不惡其冲是以成而不弊盈而不窮也大直若屈大巧若拙大辯若訥直而不屈其直必折循理而行雖曲而直巧而不拙其巧必勞付物自然雖拙而巧辯而不訥其辯必窮因理而言雖訥而辯躁勝寒靜勝熱清淨為天下正成而不缺盈而不沖直而不屈巧而不拙辯而不訥譬如躁之不能靜靜之不能躁耳夫躁能勝寒而不能勝熱靜能勝熱而不能勝寒皆滯于一偏而非其正也唯泊然清淨不染于一非成非缺非盈非沖非直非屈非巧非拙非辯非訥而後無所不勝可以為天下正矣天下有道章第四十六天下有道却走馬以糞天下各安其分則不爭而自治故却走馬而糞田天下無道戎馬生于郊罪莫大于可欲禍莫大于不知足咎莫大于欲得以其可欲者示人固有罪矣而不足其足者其禍又甚所欲必得者其咎最大匹夫有一于身患必及之侯王而為是則戎馬之所自起也故知足之足常足知足者所寓而足故無不足也不出户章第四十七不出户知天下不窺牖見天道其出彌逺其知彌少性之為體充徧宇宙無逺近古今之異古之聖人其所以不出户牖而無所不知者特其性全故耳世之人為物所蔽性分于耳目内為身心之所紛亂外為山河之所障塞見不出視聞不出聽户牖之微能蔽而絶之不知聖人復性而足乃欲出而求之是以彌逺而彌少也是以聖人不行而知不見而名不為而成性之所及非特能知能名而已蓋可以因物之自然不勞而成之矣為學日益章第四十八為學日益不知道而務學聞見日多而無以一之未免為累也孔子曰多聞擇其善者而從之多見而識之知之次也為道日損茍一日知道顧視萬物無一非妄去妄以求復性是謂之損孔子謂子貢曰女以予為多學而識之者與曰然非與曰非也予一以貫之損之又損以至于無為無為而無不為去妄以求復性可謂損矣而去妄之心猶存及其兼忘此心純性而無餘然後無所不為而不失于無為矣取天下常以無事及有事不}
