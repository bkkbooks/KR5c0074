  - {type: variant, offset: 1400, length: 275, content: 已孔德之容章第二十一孔德之容惟道是從道無形也及其運而爲德則有容矣故德者道之見也自是推之則衆有之容皆道之見於物者也道之爲物唯恍唯惚惚兮恍其中有象恍兮惚其中有物道非有無故以恍惚言之然及其運而成象著而成物未有不出於惚恍者也窈兮冥兮其中有精方有無之未定惚恍而不可見及夫有無之交則見其窈冥深眇雖未成形而精存乎其中矣其精甚眞其中有信物至於成形則眞僞雜矣方其有精不容僞也眞僞既雜自一而爲二自二而爲三紛然錯出不可復信矣方其有精不吾欺也自古及今其名不去以閲衆甫古今雖異而道則不去故以不去名之唯未嘗去故能以閲衆有之變也甫美也雖萬物之美不免於變也吾何以知衆甫之然哉以此聖人, WYG: 聽上}
