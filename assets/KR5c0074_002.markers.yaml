  - {type: line-break, offset: 172, content: '', id: KR5c0074_HFL_002-001b08}
  - {type: indent, offset: 172, content: 　, id: KR5c0074_krp_002-bkkind13}
  - {type: variant, offset: 178, length: 0, content: '', WYG: 為道道非形不可見非聲不可聞不先}
  - {type: variant, offset: 179, length: 0, content: '', WYG: 萬物之妄廓然無蔽卓然有見未免于不信也故下士聞}
  - {type: variant, offset: 180, length: 4, content: 使聖智爲, WYG: 以為荒唐謬悠而笑之中士聞道與之存亡出沒而疑之惟了然見之者然後勤行服膺而不怠孔子曰語之而不惰者其回也與斯所謂上士也哉故建言者有之建立也古之立言者有是説而老子取之下之所陳者是也明道若昧無所不照而非察也進道若退若止不行而}
  - {type: page-break, offset: 180, content: '', id: KR5c0074_WYG_002-6a, image: WYG1055/WYG1055-0216a.png}
  - {type: variant, offset: 186, length: 0, content: '', WYG: 之速者莫之或先也夷道若𩔖或夷或𩔖所至則平而未甞削也上德若谷上德不德如谷之虚也大白若辱使白而不受汙此則不屑不潔之士而非聖人也廣德若不足廣大而不可復加則止于此而已非廣也建德若偷因物之自然而無立者外若偷惰而實建也質眞若渝體聖抱神隨物變化而不失其貞者外若渝也大方無隅全其大方不小立圭角也大器晚成器大不可近用也大音希聲非耳之所得聞也大象無形非目之所得見也道隱無名夫唯道善貸且成道之所寓無所不見凡此十二者皆道之見于事者也而道之大全則隱于無名惟其所寓推}
  - {type: page-break, offset: 186, content: '', id: KR5c0074_WYG_002-6b, image: WYG1055/WYG1055-0216b.png}
  - {type: page-break, offset: 186, content: '', id: KR5c0074_WYG_002-7a, image: WYG1055/WYG1055-0216c.png}
  - {type: page-break, offset: 186, content: '', id: KR5c0074_WYG_002-7b, image: WYG1055/WYG1055-0216d.png}
