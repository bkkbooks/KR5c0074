  body:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書子部十四老子解道家𩔖提要臣等謹案道徳經解二卷宋蘇轍撰蘇氏之學本出入於二氏之間故得力於二氏者特深而其發揮二氏者亦足以自暢其説是書大㫖主於佛老同源而又引中庸之説以相比附蘇軾跋之謂使漢初有此書則孔老為一使晉宋有此書則佛老不二朱子則以其援儒入墨作雜學辨以箴之然二氏之書徃徃隂取儒理而變其説儒者説經明道不可不辨别毫釐剖析疑似以杜學者之岐趨若為二氏之學而註二氏之書則為二氏立言不為儒者立言矣其書本不免援儒入墨註其書者安得不各尊所聞哉故自儒家言之則轍書為兼兩岐自道家言之則轍書猶為各明一義今既存老子以備一家轍書亦未可竟廢矣乾隆四十年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀}
