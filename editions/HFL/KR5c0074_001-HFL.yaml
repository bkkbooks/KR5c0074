body:
  text: 眉山蘇轍註道可道章第一道可道非常道莫非道也而可道者不可常惟不可道而後可常耳今夫仁義禮智此道之可道者也然而仁不可以爲義而禮不可以爲智可道之不可常如此惟不可道然後在仁爲仁在義爲義在禮爲禮在智爲智彼皆不常而道常不變不可道之能常如此名可名非常名道不可道而況可得而名之乎凡名皆其可道者也名既立則圓方曲直之不同不可常矣無名天地之始有名萬物之母常無欲以觀其妙常有欲以觀其徼自其無名形而爲天地天地位而名始立矣自其有名播而爲萬物萬物育而名不可勝載矣故無名者道之體而有名者道之用也聖人體道以爲天下用入於衆有而常無將以觀其妙也體其至無而常有將以觀其徼也若夫行於其徼而不知其妙則粗而不神矣留於其妙而不知其徼則精而不遍矣此兩者同出而異名同謂之玄以形而言有無則信兩矣安知無運而爲有有復而爲無未嘗不一哉其名雖異其本則一知本之一也則玄矣凡遠而無所至極者其色必玄故老子常以玄寄極也玄之又玄衆妙之門言玄則至矣然猶有玄之心在焉玄之又玄則盡矣不可以有加矣衆妙之所從出也天下皆知章第二天下皆知美之爲美斯惡矣皆知善之爲善斯不善矣故有無之相生難易之相成長短之相形高下之相傾聲音之相和前後之相隨天下以形名言美惡其所謂美且善者豈信美且善哉彼不知有無難易長短高下聲音前後之相生相奪皆非其正也方且自以爲長而有長於我者臨之斯則短矣方且自以爲前而有前於我者先之斯則後矣苟從其所美而信之則失之遠矣是以聖人處無爲之事行不言之教當事而爲無爲之之心當教而言無言之之意夫是以出於長短之度離於先後之數非美非惡非善非不善而天下何足以知之萬物作而不辭生而不有爲而不恃功成不居萬物爲我作而我無所辭我生之爲之而未嘗有未嘗恃至於成功亦未嘗以自居也此則無爲不言之報其爲美且善也豈復有惡與不善繼之哉夫惟不居是以不去聖人居於貧賤而無貧賤之憂居於富貴而無富貴之累此所謂不居也我且不居彼尚何從去哉此則居之至也不尚賢章第三不尚賢使民不爭不貴難得之貨使民不爲盜不見可欲使心不亂是以聖人之治也虚其心實其腹弱其志强其骨尚賢則民恥於不若而至於爭貴難得之貨則民病於無有而至於盜見可欲則民患於不得而至於亂雖然天下知三者之爲患而欲舉而廢之則惑矣聖人不然未嘗不用賢也獨不尚賢耳未嘗棄難得之貨也獨不貴之耳未嘗去可欲也獨不見之耳夫是以賢者用而民不爭難得之貨可欲之事畢效於前而盜賊禍亂不起是不亦虚其心而不害腹之實弱其志而不害骨之强也哉今將舉賢而尚之寳貨而貴之衒可欲以示之則是心與腹皆實也若舉而廢之則是志與骨皆弱也心與腹皆實則民爭志與骨皆弱則無以立矣常使民無知無欲使夫知者不敢爲也不以三者衒之則民不知所慕澹乎其無欲雖有智者無所用巧矣爲無爲則無不治矣即用三者之自然而不尚不貴不見所謂爲無爲也道沖章第四道沖而用之或似不盈淵兮似萬物之宗夫道沖然至無耳然以之適衆有雖天地之大山河之廣無所不遍以其無形故似不盈者淵兮深眇吾知其爲萬物宗也而不敢正言之故曰似萬物之宗挫其銳解其紛和其光同其塵湛兮似或存人莫不有道也而聖人能全之挫其銳恐其流於妄也解其紛恐其與物構也不流於妄不構於物外患已去而光生焉又從而和之恐其與物異也光至潔也塵至雜也雖塵無所不同恐其棄萬物也如是而後全則湛然其常存矣雖存而人莫之識故曰似或存耳吾不知誰之子象帝之先道雖常存終莫得而名之然亦不可謂無也故曰此豈帝之先耶帝先矣而又先於帝則莫或先之者矣天地不仁章第五天地不仁以萬物爲芻狗聖人不仁以百姓爲芻狗天地無私而聽萬物之自然故萬物自生自死死非吾虐之生非吾仁之也譬如結芻以爲狗設之於祭祀盡飾以奉之夫豈愛之時適然也既事而棄之行者踐之夫豈惡之亦適然也聖人之於民亦然特無以害之則民全其性死生得喪吾無與焉雖未嘗仁之而仁亦大矣天地之間其獨橐籥乎虚而不屈動而愈出排之有橐與籥也方其一動氣之所及無不靡也不知者以爲機巧極矣然橐籥則何爲哉蓋亦虚而不屈是以動而愈出耳天地之間其所以生殺萬物雕刻衆形者亦若是而已矣多言數窮不如守中見其動而愈出不知其爲虚中之報也故告之以多言數窮不如守中之不窮也谷神不死章第六谷神不死是謂玄牝谷至虚而猶有形谷神則虚而無形也虚而無形尚無有生安有死耶謂之谷神言其德也謂之玄牝言其功也牝生萬物而謂之玄焉言見其生之而不見其所以生也玄牝之門是謂天地根玄牝之門言萬物自是出也天地根言天地自是生也綿綿若存用之不勤綿綿微而不絶也若存存而不可見也能如是雖終曰用之而不勞矣天長地乆章第七天長地久天地雖大而未離於形數則其長久蓋有量矣然老子之言長久極於天地蓋以人所見者言之耳若夫長久之至則所謂天地始者是矣天地所以能長且乆者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私邪故能成其私天地生物而不自生立於萬物之外故能長生聖人後其身而先人外其身而利人處於衆入之表故能先且存如使天地與物競生而聖人與人爭得則天地亦一物耳聖人亦一人耳何以大過之哉雖然彼其無私非以求成私也而私以之成道則固然耳上善若水章第八上善若水水善利萬物而不爭處衆人之所惡故幾於道易曰一陰一陽之謂道繼之者善也成之者性也又曰天以一生水蓋道運而爲善猶氣運而生水也故曰上善若水二者皆自無而始成形故其理同道無所不在無所不利而水亦然然而既已麗於形則於道有間矣故曰幾於道矣然而可名之善未有若此者也故曰上善居善地心善淵與善仁言善信政善治事善能動善時避高趨下未嘗有所逆善地也空虚靜默深不可測善淵也利澤萬物施而不求報善仁也圓必旋方必折塞必止决必流善信也洗滌群穢平準高下善治也遇物賦形而不留於一善能也冬凝春泮涸溢不失節善時也夫惟不爭故無尤有善而不免於人非者以其爭也水惟不爭故兼七善而無尤持而盈之章第九持而盈之不如其已揣而銳之不如長保知盈之必溢而以持固之不若不盈之安也知銳之必折而以揣先之不如揣之不可必恃也若夫聖人有而不有尚安有盈循理而後行尚安有銳無盈則無所用持而無銳則無所用揣矣金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道日中則移月滿則虧四時之運功成者去天地尚然而況於人乎載營魄章第十載營魄抱一能無離乎魄之所以異於魂者魄爲物魂爲神也易曰精氣爲物遊魂爲變是故知鬼神之情狀魄爲物故雜而止魂爲神故一而變謂之營魄言其止也蓋道無所不在其於人爲性而性之妙爲神言其純而未雜則謂之一言其聚而未散則謂之樸其歸皆道也各從其實言之耳聖人性定而神凝不爲物遷雖以魄爲舍而神所欲行魄無不從則神常載魄矣衆人以物役性神昏而不治則神聽於魄耳目困以聲色鼻口勞以臭味魄所欲行而神從之則魄常載神矣故教之以抱神載魄使兩者不相離此固聖人所以修身之要至於古之眞人深根固蒂長生乆視其道亦由是也專氣致柔能如嬰兒乎神不治則氣亂强者好鬬弱者喜畏不自知也神治則氣不妄作喜怒各以其類是之謂專氣神虚之至也氣實之始也虚之極爲柔實之極爲剛純性而亡氣是之謂致柔嬰兒不知好惡是以性全性全而氣微氣微而體柔專氣致柔能如嬰兒極矣滌除玄覽能無疵乎聖人外不爲魄所載内不爲氣所使則其滌除塵垢盡矣於是其神廓然玄覽萬物知其皆出於性等觀淨穢而無所瑕疵矣愛民治國能無爲乎既以治身又推其餘以及人雖至於愛民治國一以無心遇之苟其有心則愛民者適所以害之治國者適所以亂之也天門開闔能爲雌乎天門者治亂廢興所從出也既以身任天下方其開闔變會之間衆人貴得而患失則先事以徼福聖人循理而知天命則待唱而後和易曰先天而天弗違非先天也後天而奉天時非後天也言其先後常與天命會耳不然先者必蚤後者必莫皆失之矣故所謂能爲雌者亦不失時而已明白四達能無知乎内以治身外以治國至於臨變莫不有道也非明白四達而能之乎明白四達心也是心無所不知然而未嘗有能知之心也夫心一而已苟又有知之者則是二也自一而二蔽之所自生而愚之所自始也今夫鏡之於物來而應之則已矣又安得知應物者乎本則無有而以意加之此妄之源也生之畜之生而不有爲而不恃長而不宰是謂玄德其道既足以生畜萬物又能不有不恃不宰雖有大德而物莫之知也故曰玄德三十輻章第十一三十輻共一轂當其無有車之用埏埴以爲器當其無有器之用鑿户牖以爲室當其無有室之用故有之以爲利無之以爲用竭知盡物以爲器而器之用常在無有中非有則無無以致其用非無則有有以施其利是以聖人常無以觀其妙常有以觀其徼知兩者之爲一而不可分則至矣五色章第十二五色令人目盲五音令人耳聾五味令人口爽視色聽音嘗味其本皆出於性方其有性而未有物也至矣及目縁五色耳縁五音口縁五味奪於所縁而忘其本則雖見而實盲雖聞而實聾雖嘗而實爽也馳騁田獵令人心發狂難得之貨令人行妨是以聖人爲腹不爲曰故去彼取此聖人視色聽音嘗味皆與人同至於馳騁田獵未嘗不爲而難得之貨未嘗不用也然人皆以爲病而聖人獨以爲福何也聖人爲腹而衆人爲目目貪而不能受腹受而未嘗貪故也彼物之自外至者也此性之凝於内者也寵辱章第十三寵辱若驚貴大患若身古之達人驚寵如驚辱知寵之爲辱先也貴身如貴大患知身之爲患本也是以遺寵而辱不及忘身而患不至何謂寵辱寵爲下得之若驚失之若驚是謂寵辱若驚所謂寵辱非兩物也辱生於寵而世不悟以寵爲上而以辱爲下者皆是也若知辱生於寵則寵顧爲下矣故古之達人得寵若驚失寵若驚未嘗安寵而驚辱也所謂若驚者非實驚也若驚而已何謂貴大患若身吾所以有大患者爲吾有身及吾無身吾有何患貴之爲言難也有身大患之本而世之士難於履大患不難於有其身故聖人因其難於履患而教之以難於有身知有身之爲難而大患去矣性之於人生不能加死不能損其大可以充塞天地其精可以蹈水火入金石凡物莫能患也然天下常患亡失本性而惟身之爲見愛身之情篤而物始能患之矣生死疾病之變攻之於内寵辱得失之交攖之於外未有一物而非患也夫惟達人知性之無壞而身之非實忽然忘身而天下之患盡去然後可以渉世而無累矣故貴以身爲天下若可寄天下愛以身爲天下若可託天下人之所以騖於權利溺於富貴犯難而不悔者凡將以厚其身耳今也禄之以天下而重以身任之則其忘身也至矣如此而以天下予之雖天下之大不能患之矣視之不見章第十四視之不見名曰夷聽之不聞名曰希搏之不得名曰微此三者不可致詰故復混而爲一視之而見者色也所以見色者不可見也聽之而聞者聲也所以聞聲者不可聞也搏之而得者觸也所以得觸者不可得也此三者雖有智者莫能詰也要必混而歸於一而後可爾所謂一者性也三者性之用也人始有性而已及其與物構然後分裂四出爲視爲聽爲觸日用而不知反其本非復混而爲一則日遠矣若推而廣之則佛氏所謂六入皆然矣首楞嚴有云反流全一六用不行此之謂也其上不皦其下不昧物之有形者皆麗於陰陽故上皦下昧不可逃也道雖在上而不皦雖在下而不昧不可以形數推也繩繩不可名復歸於無物繩繩運而不絶也人見其運而不絶則以爲有物矣不知其卒歸於無也是謂無狀之狀無象之象是謂惚恍狀其著也象其微也無狀之狀無象之象皆非無也有無不可名故謂之惚恍迎之不見其首隨之不見其後道無所不在故無前後可見執古之道以御今之有能知古始是謂道紀古者物之所從生也有者物之今則無者物之古也執其所從生則進退疾徐在我矣古之善爲士章第十五古之善爲士者微妙玄通深不可識粗盡而微微極而妙妙極而玄玄則無所不通而深不可識矣夫唯不可識故强爲之容豫若冬涉川戒而後動曰豫其所欲爲猶迫而後應豫然若冬涉川逡巡如不得已也猶若畏四鄰疑而不行曰猶其所不欲遲而難之猶然如畏四鄰之見之也儼若容無所不敬未嘗惰也涣若冰將釋知萬物之出於妄未嘗有所留也敦兮其若樸人僞已盡復其性也曠兮其若谷虚而無所不受也渾兮其若濁和其光同其塵不與物異也孰能濁以靜之徐清孰能安以乆動之徐生世俗之士以物汨性則濁而不復清枯槁之士以定滅性則安而不復生今知濁之亂性也則靜之靜之而徐自清矣知滅性之非道也則動之動之而徐自生矣易曰寂然不動感而遂通天下之故今所謂動者亦若是耳保此道者不欲盈盈生於極濁而不能清安而不能生所以盈也夫惟不盈故能弊不新成物未有不弊者也夫惟不盈故其弊不待新成而自去致虚極章第十六致虚極守靜篤致虚不極則有未亡也守靜不篤則動未亡也丘山雖去而微塵未盡未爲極與篤也蓋致虚存虚猶未離有守靜存靜猶陷於動而況其他乎不極不篤而責虚靜之用難矣萬物並作吾以觀其復極虚篤靜以觀萬物之變然後不爲變之所亂知凡作之未有不復者也苟吾方且與萬物皆作則不足以知之矣夫物芸芸各歸其根萬物皆作於性皆復於性譬如華葉之生於根而歸於根濤瀾之生於水而歸於水耳歸根曰靜苟未能自復於性雖止動患念以求靜非靜也故惟歸根然後爲靜靜曰復命命者性之妙也性猶可言至於命則不可言矣易曰窮理盡性以至於命聖人之學道必始於窮理中於盡性終於復命仁義禮樂聖人之所以接物也而仁義禮樂之用必有所以然者不知其所以然徇其名而爲之世俗之士也知其所以然而後行之君子也此之謂窮理雖然盡心以窮理而後得之不求則不得也事物日構於前必求而後能應則其爲力也勞而爲功也少聖人外不爲物所蔽其性湛然不勉而中不思而得物至而能應此之謂盡性雖然此吾性也猶有物我之辨焉則幾於妄矣君之命曰命天之命曰命以性接物而不知其爲我是以寄之命也此之謂復命復命曰常方其作也雖天地山河之大未有不變壞不常者惟復於性而後湛然常存矣知常曰明不以復性爲明則皆世俗之智雖自謂明而非明也不知常妄作凶不知復性則縁物而動無作而非凶雖得於一時而失之遠矣知常容方迷於妄則自是而非彼物皆吾敵吾何以容之苟知其皆妄則雖仇讎猶將哀而憐之夫何所不容哉容乃公無所不容則彼我之情盡而尚誰私乎公乃王無所不公則天下將往而歸之矣王乃天無所不懷雖天何以加之天乃道天猶有形至於道則極矣然而雖道外不能復進於此矣道乃乆没身不殆太上章第十七太上下知有之以道在宥天下而未嘗治之民不知其所以然故亦知有之而已其次親之譽之以仁義治天下其德可懷其功可見故民得而親譽之其名雖美而厚薄自是始矣其次畏之侮之以政齊民民非不畏也然力之所不及則侮之矣信不足有不信吾誠自信則以道御天下足矣唯不自信而加以仁義重以刑政而民始不信矣猶其貴言功成事遂百姓謂我自然聖人自信有餘其於言也猶然貴之不輕岀諸口而民已信之矣及其功成事遂則民日遷善遠罪而不自知也道德眞經註卷之一
