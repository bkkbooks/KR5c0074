body:
  text: 眉山蘇轍註大道廢章第十八大道廢有仁義大道之隆也仁義行於其中而民不知道既廢而後仁義見矣智慧出有大僞世不知道之足以澹足萬物也而以智慧加之於是民始以僞報之矣六親不和有孝慈國家昏亂有忠臣六親方和孰非孝慈國家方治孰非忠臣堯非不孝也而獨稱舜無瞽叟也伊尹周公非不忠也而獨稱龍逄比千無桀紂也涸澤之魚相呴以沬相濡以溼不如相忘於江湖絶聖棄智章第十九絶聖棄智民利百倍非聖智不足以知道使聖智爲天下其有不以道御物者乎然世之人不足以知聖智之本而見其末以爲以巧勝物者也於是馳騁於其末流而民始不勝其害矣故絶聖棄智民利百倍絶仁棄義民復孝慈未有仁而遺其親者也未有義而後其君者也仁義所以爲孝慈矣然及其衰也竊仁義之名以要利於世於是子有違父而父有虐子此則仁義之迹爲之也故絶仁棄義則民復孝慈絶巧棄利盜賊無有巧所以便事也利所以濟物也二者非以爲盜盜賊不得則不行故絶巧棄利盜賊無有此三者以爲文不足故令有所屬見素抱樸少私寡欲世之貴此三者以爲天下之不安由文之不足故也是以或屬之聖智或屬之仁義或屬之巧利蓋將以文治之也然而天下益以不安曷不反其本乎見素抱樸少私寡欲而天下各復其性雖有三者無所用之矣故曰我無爲而民自化我好靜而民自正我無事而民自富我無欲而民自樸此則聖智之大仁義之至巧利之極也然孔子以仁義禮樂治天下老子絶而棄之或者以爲不同易曰形而上者謂之道形而下者謂之器孔子之慮後世也深故示人以器而晦其道使中人以下守其器不爲道之所眩以不失爲君子而中人以上自是以上達也老子則不然志於明道而急於開人心故示人以道而薄於器以爲學者惟器之知則道隱矣故絶仁義棄禮樂以明道夫道不可言可言皆其似者也達者因似以識眞而昧者執似以陷於僞故後世執老子之言以亂天下者有之而學孔子者無大過因老子之言以達道者不少而求之於孔子者常苦其無所從入二聖人者皆不得已也全於此必略於彼矣絶學無憂章第二十絶學無憂爲學日益爲道日損不知性命之正而以學求益增其所未聞積之不已而無以一之則以圓害方以直害曲其中紛然不勝其憂矣患夫學者之至此也故曰絶學無憂若夫聖人未嘗不學而以道爲主不學而不少多學而不亂廓然無憂而安用絶學耶唯之與阿相去幾何善之與惡相去何若學者溺於所聞而無以一之則唯之爲恭阿之爲慢不可同日言矣而況夫善惡之相反乎夫唯聖人知萬物同出於性而皆成於妄如畫馬牛如刻虎彘皆非其實湣焉無是非同異之辨孰知其相去幾何哉苟知此矣則萬物並育而不相害道並行而不相悖無足怪矣人之所畏不可不畏聖人均彼我一同異其心無所復留然豈以是忽遺世法犯分亂理而不顧哉人之所畏吾亦畏之人之所爲吾亦爲之雖列於君臣父子之間行於禮樂刑政之域而天下不知其異也其所以不嬰於物者其心而已荒兮其未央哉人皆徇其所知故介然不出畦畛聖人兼涉有無無入而不可則荒兮其未可央也衆人熙熙如享太牢如春登臺我獨怕兮其未兆若嬰兒之未孩人各溺於所好其美如享太牢其樂如春登臺囂然從之而不知其非唯聖人深究其妄遇之泊然不動如嬰兒之未能孩也乗乗兮若無所歸乗萬物之理而不自私故若無所歸衆人皆有餘而我獨若遺衆人守其所知各自以爲有餘聖人包舉萬物而不主於一超然其若遺也我愚人之心也哉純純兮純純若愚而非愚也俗人昭昭我獨若昏俗人察察我獨悶悶世俗以分别爲智聖人知群妄之不足辨也故其外若昏其中若悶忽若晦寂若無所止忽焉若晦不見其津涯也寂然無朕不見其所止宿也衆人皆有以我獨頑似鄙人各有能故世皆得而用之聖人才全德備若無所施故疑於頑鄙我獨異於人兒貴食母道者萬物之母衆人徇物忘道而聖人脱遺萬物以道爲宗譬如嬰兒無所雜食食於母而已孔德之容章第二十一孔德之容惟道是從道無形也及其運而爲德則有容矣故德者道之見也自是推之則衆有之容皆道之見於物者也道之爲物唯恍唯惚惚兮恍其中有象恍兮惚其中有物道非有無故以恍惚言之然及其運而成象著而成物未有不出於惚恍者也窈兮冥兮其中有精方有無之未定惚恍而不可見及夫有無之交則見其窈冥深眇雖未成形而精存乎其中矣其精甚眞其中有信物至於成形則眞僞雜矣方其有精不容僞也眞僞既雜自一而爲二自二而爲三紛然錯出不可復信矣方其有精不吾欺也自古及今其名不去以閲衆甫古今雖異而道則不去故以不去名之唯未嘗去故能以閲衆有之變也甫美也雖萬物之美不免於變也吾何以知衆甫之然哉以此聖人之所以知萬物之所以然者以能體道而不去故也曲則全章第二十二曲則全聖人動必循理理之所在或直或曲要於通而已通故與物不迕不迕故全也枉則直直而非理則非直也循理雖枉而天下之至直也窪則盈衆之所歸者下也雖欲不盈不可得矣弊則新昭昭察察非道也悶悶若將弊矣而日新之所自岀也少則得道一而已得一則無不得矣多則惑矣多學而無以一之則惑矣是以聖人抱一爲天下式抱一者復性者也蓋曲則全枉則直窪則盈弊則新少則得皆抱一之餘也故以抱一終之不自見故明目不自見故能見物鏡不自照故能照物如使自見自照則自爲之不暇而何暇及物哉不自是故彰不自伐故功不自矜故長夫惟不爭故天下莫能與之爭不自見不自是不自伐不自矜皆不爭之餘也故以不爭終之古之所謂曲則全者豈虚言哉誠全而歸之世以直爲是以曲爲非將循理而行於世則有不免於曲者矣故終篇復言之曰此豈虚言哉誠全而歸之夫所謂全者非獨全身也内以全身外以全物物我兼全而歸復於性則其爲直也大矣希言自然章第二十三希言自然言岀於自然則簡而中非其自然而强言之則煩而難信矣故曰道之出口淡乎其無味視之不足見聽之不足聞用之不可既此所謂希言矣飄風不終朝暴雨不終日孰爲此者天地天地尚不能乆而況於人乎陰陽不爭風雨時至不疾不徐盡其勢之所至而後止若夫陽亢於上陰伏於下否而不得洩於是爲飄風暴雨若將不勝然其勢不能以終日古之聖人言出於希行出於夷皆因其自然故乆而不窮世或厭之以爲不若詭辯之悦耳怪行之驚世不知其不能乆也故從事於道者道者同於道德者同於德失者同於失同於道者道亦得之同於德者德亦得之同於失者失亦得之孔子曰苟志於仁矣無惡也故曰仁者之過易辭志於仁猶若此而況志於道者乎夫苟從事於道矣則其所爲合於道者得道合於德者得德不幸而失雖失於所爲然必有得於道德矣信不足有不信不知道者信道不篤因其失而疑之於是益以不信失惟知道然後不以得失疑道也跂者不立章第二十四跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長人未有不能立且行者也苟以立爲未足而加之以跂以行爲未足而加之以跨未有不喪失其行立者彼其自見自是自伐自矜者亦若是矣其於道也曰餘食贅行譬如飲食適飽則已有餘則病譬如四體適完則已有贅則累物或惡之故有道者不處有物混成章第一一十五有物混成先天地生夫道非清非濁非高非下非去非來非善非惡混然而成體其於人爲性故曰有物混成此未有知其生者蓋湛然常存而天地生於其中耳寂兮寥兮獨立而不改周行而不殆可以爲天下母寂兮無聲寥兮無形獨立無匹而未嘗變行於群有而未嘗殆俯以化育萬物則皆其母矣吾不知其名字之曰道强爲之名曰大道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故强爲之名曰大然其實則無得而稱之也大曰逝逝曰遠遠曰反自大而求之則逝而往矣自往而求之則遠不及矣雖逝雖遠然反而求之一心足矣故道大天大地大王亦大域中有四大而王居一焉人法地地法天天法道道法自然由道言之則雖天地與王皆不足大也然世之人習知三者之大而不信道之大也故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣重爲輕根章第二十六重爲輕根靜爲躁君凡物輕不能載重小不能鎮大不行者使行不動者制動故輕以重爲根躁以靜爲君是以君子終日行不離輜重雖有榮觀燕處超然行欲輕而不離輜重榮觀雖樂而必有燕處重靜之不可失如此奈何萬乗之主而以身輕天下人主以身任天下而輕其身則不足以任天下矣輕則失臣躁則失君輕與躁無施而可然君輕則臣知其不足賴臣躁則君知其志於利故曰輕則失臣躁則失君善行無轍迹章第二十七善行無轍迹乗理而行故無迹善言無瑕謫時然後言故言滿天下無口過善計不用籌筭萬物之數畢陳於前不計而知安用籌筭善閉無關楗而不可開善結無繩約而不可解全德之人其於萬物如母之於子雖縱之而不去故無關而能閉無繩而能約是以聖人常善救人故無棄人常善救物故無棄物彼方執筭以計設關以閉持繩以結其力之所及者少矣聖人之於人非特容之又善救之我不棄人而人安得不歸我乎是謂襲明救人於危難之中非救之大者也方其流轉生死爲物所蔽而推吾至明以與之使暗者皆明如燈相傳相襲而不絶則可謂善救人矣故善人不善人之師不善人善人之資不貴其師不愛其資聖人無心於教故不愛其資天下無心於學故不貴其師聖人非獨吾忘天下亦能使天下忘我故也雖智大迷是謂要妙聖人之妙雖智者有所不諭也知其雄章第二十八知其雄守其雌爲天下谿爲天下谿常德不離復歸於嬰兒知其白守其黑爲天下式爲天下式常德不忒復歸於無極知其榮守其辱爲天下谷爲天下谷常德乃足復歸於樸雄雌先後之及我者也白黑明闇之及我者也榮辱貴踐之及我者也夫欲先而惡後欲明而惡闇欲貴而惡賤物之情也然而先後之及我不若明闇之切明闇之及我不若貴賤之深古之聖人去妄以求復性其性愈明則其守愈下其守愈下則其德愈厚其德愈厚則其歸愈大蓋不知而不爲不若知而不爲之至也知其雄守其雌知性者也知性而爭心止則天下之爭先者皆將歸之如水之赴谿莫有去者雖然譬如嬰兒能受而未能用也故曰復歸於嬰兒知其白守其黑見性者也居闇而視明天下之明者皆不能以形逃也故衆明則之以爲法雖應萬物而法未嘗差用未嘗窮也故曰復歸於無極知其榮守其辱復性者也諸妄已盡處辱而無憾曠兮如谷之虚物來而應之德足於此純性而無雜矣故曰復歸於樸樸散則爲器聖人用之則爲官長故大制不割聖人既歸於樸復散樸爲器以應萬物譬如人君分政以立官長亦因其勢之自然雖制而非有所割裂也將欲取天下章第二十九將欲取天下而爲之吾見其不得已聖人之有天下非取之也萬物歸之不得已而受之其治天下非爲之也因萬物之自然而除其害耳若欲取而爲之則不可得矣天下神器不可爲也爲者敗之執者失之凡物皆不可爲也雖有百人之聚不循其自然而妄爲之必有齟齬不服者而況天下乎雖然小物寡衆蓋有可以力取而智奪者至於天下之大有神主之不待其自歸則叛不聽其自治則亂矣凡物或行或隨或呴或吹或强或羸或載或隳是以聖人去甚去奢去泰陰陽相盪高下相傾大小相使或行於前或隨於後或呴而煖之或吹而寒之或益而强之或損而羸之或載而成之或隳而毁之皆物之自然而勢之不免者也然世之愚人私己而務得乃欲拒而違之其禍不覆則折唯聖人知其不可逆則順以待之去其甚去其奢去其泰使不至於過而傷物而天下無患矣此不爲之至也堯湯之於水旱雖不能免而終不至於敗由此故也易之泰曰后以財成天地之道輔相天地之宜以左右民三陽在内三陰在外物之泰極矣聖人懼其過而害生故財成而輔相之使不至於過此所謂去甚去奢去泰也以道佐人主章第三十以道佐人主者不以兵强天下其事好還聖人用兵皆出不得已非不得已而欲以强勝天下雖或能勝其禍必還報之楚靈齊湣秦始皇漢孝武或以殺其身或以禍其子孫人之所毒鬼之所疾未有得免者也師之所處荆棘生焉大軍之後必有凶年兵之所在民事廢故田不修用兵之後殺氣勝故年穀傷凡兵皆然而況以兵强天下者耶故善者果而己不敢以取强果决也德所不能綏政所不能服不得已而後以兵决之耳果而勿矜果而勿伐果而勿驕果而不得已是果而勿强勿矜勿伐勿驕不得已四者所以爲勿强也物壯則老是謂不道不道早已壯之必老物無不然者唯有道者成而若缺盈而若沖未嘗壯故未嘗老未嘗死以兵强天下壯亦甚矣而能無老乎夫佳兵章第三十一夫佳兵者不祥之器物或惡之故有道者不處以之濟難而不以爲常是謂不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬淡爲上勝而不美而美之者是樂殺人夫樂殺人者不可得志於天下吉事尚左凶事尚右偏將軍處左上將軍處右言以喪禮處之殺人衆多以悲哀泣之戰勝則以喪禮處之道常無名章第三十二道常無名樸雖小天下不敢臣侯王若能守萬物將自賔樸性也道常無名則性亦不可名矣故其爲物舒之無所不在而歛之不盈毫末此所以雖小而不可臣也故匹夫之賤守之則塵垢粃糠足以陶鑄堯舜而侯王之尊不能守則萬物不賔矣天地相合以降甘露人莫之令而自均沖氣升降相合爲一而降甘露脗然被於萬物無不均遍聖人體至道以應諸有亦露之無不及者此所以能賔萬物也始制有名名亦既有夫亦將知止知止所以不殆聖人散樸爲器因器制名豈其徇名而忘樸逐末而喪本哉蓋亦知復於性是以乗萬變而不殆也譬道之在天下猶川谷之與江海江海水之鍾也川谷水之分也道萬物之宗也萬物道之末也皆水也故川谷歸其所鍾皆道也故萬物賔其所宗知人者智章第三十三知人者智自知者明分别爲知蔽盡爲明分别之心未除故止於知人而不能自知蔽盡則無復分别故能自知而又可以及人也勝人者有力自勝者强力能及人而不能及我能克己復性則非力之所及故可謂强矣知足者富知足者所遇而足則未嘗不富矣雖有天下而常挾不足之心以處之則是終身不能富也强行者有志不與物爭而自强不息物莫能奪其志也不失其所者乆物變無窮而心未嘗失則乆矣死而不亡者壽死生之變亦大矣而其性湛然不亡此古之至人能不生不死者也大道汎兮章第三十四大道汎兮其可左右汎兮無可無不可故左右上下周旋無不至也萬物恃之以生而不辭功成不名有世有生物而不辭者必將名之以爲己有世有避物而不有者必將辭物而不生生而不辭成而不有者唯道而已愛養萬物而不爲主常無欲可名於小萬物歸之不爲主可名於大是以聖人終不爲大故能成其大大而有爲大之心則小矣執大象章第三十五執大象天下往道非有無故謂之大象苟其昭然有形則有同有異同者好之異者惡之好之則來惡之則去不足以使天下皆往矣往而不害安平泰有好有惡則有所利有所害好惡既盡則其於萬物皆無害矣故至者無不安無不平無不泰樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既作樂設餌以待來者豈不足以止過客哉然而樂闋餌盡彼將捨之而去若夫執大象以待天下天下不知好之又況得而惡之乎雖無臭味形色聲音以悦人而其用不可盡矣將欲歙之章第三十六將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之是謂微明未嘗與之而遽奪則勢有所不極理有所不足勢不極則取之難理不足則物不服然此幾於用智也與管仲孫武何異聖人之與世俗其迹固有相似者也聖人乗理而世俗用智乗理如醫藥巧於應病用智如商賈巧於射利柔勝剛弱勝强聖人知剛强之不足恃故以柔弱自處天下之剛强方相傾相軋而吾獨柔弱以待之及其大者傷小者死而吾以不校坐待其斃此所謂勝也雖然聖人豈有意爲此以勝物哉知勢之自然而居其自然耳魚不可以脱於淵國之利器不可以示人魚之爲物非有爪牙之利足以勝物也然方其託於深淵雖强有力者莫能執之及其脱淵而陸則蠢然一物耳何能爲哉聖人居於柔弱而剛强者莫能傷非徒莫能傷也又將以前制其後此不亦天下之利器也哉魚惟脱於淵然後人得制之聖人惟處於柔弱而不厭故終能服天下此豈與衆人共之者哉道常無爲章第三十七道常無爲而無不爲無所不爲而無爲之之意耳侯王若能守萬物將自化化而欲作吾將鎮之以無名之樸聖人以無爲化物萬物化之始於無爲而漸至於作譬如嬰兒之長人僞日起故三代之衰人情之變日以益甚方其欲作而上之人與天下皆靡故其變至有不可勝言者苟其方作而不爲之動終以無名之樸鎮之庶幾可得而止也無名之樸亦將不欲不欲以靜天下將自正聖人中無抱樸之念外無抱樸之迹故樸全而用大苟欲樸之心尚存於胸中則失之遠矣道德眞經註卷之二
