front:
  text: 道德眞經註卷之四得十
  hash: sha256:5817e96cb0f4c4d91a553f271aee9d20e19f246ac5fe75d2284491ebf48c19ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0074_SJB_004-120315b, image: sjb/12/120315b.png}
body:
  text: 眉山蘇轍註大國者下流章第六十一大國者下流天下之歸大國猶衆水之趨下流也天下之交天下之牝牝常以靜勝牡以靜爲下衆動之赴靜猶衆高之赴下也故大國以下小國則取小國小國以下大國則取大國大國能下則小國附之小國能下則大國納之故或下以取或下而取大國下以取人小國下而取於人大國不過欲兼畜人小國不過欲入事人兩者各得其所欲故大者宜爲下道者萬物之奥章第六十二道者萬物之奥善人之寳不善人之所保美言可以市尊行可以加人人之不善何棄之有凡物之見於外者皆其門堂也道之在物譬如其奥物皆有之而人莫之見耳夫惟賢者得而有之故曰善人之寳愚者雖不能有然而非道則不能安也故曰不善人之所保蓋道不遠人而人則遠之今誠有人美言之則可以爲市於世尊行之則可以加於人矣朝爲不義而夕聞大道妄盡而性復雖欲指其不善不可得也而又安可棄之哉故立天子置三公雖有拱璧以先駟馬不如坐進此道立天子置三公將以道救人耳雖有拱璧之貴駟馬之良而進之不如進此道之多也古之所以貴此道者何不曰求以得有罪以免耶故爲天下貴道本在我人患不求求則得之矣道無功罪人患不知知則凡罪不能汗也爲無爲章第六十三爲無爲事無事味無味大小多少報怨以德聖人爲無爲故無所不爲事無事故無所不事味無味故無所不味其於大小多少一以道遇之而已蓋人情之所不忘者怨也然及其愛惡之情忘則雖報怨猶報德也圖難於其易爲大於其細天下難事必作於易天下大事必作於細是以聖人終不爲大故能成其大夫輕諾必寡信多易必多難是以聖人由難之故終無難世人莫不畏大而侮小難多而易少至於難而後圖大而後爲則事常不濟矣聖人齊大小一多少無所不畏無所不難而安有不濟者哉其安易持章第六十四其安易持其未兆易謀其脆易泮其微易散爲之於未有治之於未亂方其未有持而謀之足矣及其將然非泮而散之不去也然猶愈於既成也故爲之於未有者上也治之於未亂者次也合抱之木生於毫末九層之臺起於累土千里之行始於足下爲者敗之執者失之是以聖人無爲故無敗無執故無失治亂禍福之來皆如彼三者積小以成大聖人持之以無爲守之以無執故能使福自生使禍自亡譬如種苗深耕而厚耔之及秋自穰譬如被盜危坐而熟視之盜將自郤世人不知物之自然以爲非爲不成非執不留故常與禍爭勝與福爭贅是以禍至於不救福至於不成蓋其理然也民之從事常於幾成而敗之愼終如始則無敗事聖人知有爲之害不以人助天始終皆因其自然故無不成者世人心存於得喪方事之微猶有不知而聽其自然者及見其幾成而重失之則未有不以爲敗之者矣故曰愼終如始則無敗事是以聖人欲不欲不貴難得之貨學不學復衆人之所過以輔萬物之自然而不敢爲人皆徇其所欲以傷物信其所學以害理聖人非無欲也欲而不欲故雖欲而不傷於物非無學也學而不學故雖學而不害於理然後内外空明廓然無爲可以輔萬物之自然而待其自成矣古之善爲道者章第六十五古之善爲道者非以明民將以愚之古之所謂智者知道之大全而覽於物之終始故足貴也凡民不足以知此而溺於小智以察爲明則智之害多矣故聖人以道治民非以明之將以愚之耳蓋使之無知無欲而聽上之所爲則雖有過亦小矣民知難治以其智多故以智治國國之賊吾以智御人人亦以智應之而上下交相賊矣不以智治國國之福知此兩者亦楷式能知楷式是謂玄德玄德深矣遠矣與物反矣然後乃至大順吾之所貴者德也物之所貴者智也德與智固相反然智之所順者小而德之所順者大矣江海爲百谷王章第六十六江海所以能爲百谷王者以其善下之故能爲百谷王是以聖人欲上人以其言下之欲先人以其身後之聖人非欲上人非欲先人也蓋下之後之其道不得不上且先耳是以處上而人不重處前而人不害是以天下樂推而不厭以其不爭故天下莫能與之爭天下皆謂章第六十七天下皆謂我道大似不肖夫唯大故似不肖若肖乆矣其細也夫夫道曠然無形頽然無名充遍萬物而與物無一相似此其所以爲大也若似於物則亦一物矣而何足大哉我有三寳保而持之一曰慈二曰儉三曰不敢爲天下先道以不似物爲大故其運而爲德則亦悶然以鈍爲利以退爲進不合於世俗今夫世俗貴勇敢尚廣大夸進銳而吾之所寳則慈忍儉約廉退此三者皆世之所謂不肖者也夫慈故能勇世以勇决爲賢而以慈忍爲不及事不知勇决之易挫而慈忍之不可勝其終必至於勇也儉故能廣世以廣大蓋物而以儉約爲陋不知廣大之易窮而儉約之易足其終必至於廣也不敢爲天下先故能成器長世以進銳爲能而以不敢先爲耻不知進銳之多惡於人而不敢先之樂推於世其終卒爲器長也蓋樸散而爲器聖人用之則爲官長自樸成器始有屬有長矣今捨其慈且勇捨其儉且廣捨其後且先死矣勇廣先三者人之所共疾也爲衆所疾故常近於死夫慈以戰則勝以守則固天將救之以慈衛之以慈御物物之愛之如己父母雖爲之效死而不辭故可以戰可以守天之將救是人也則開其心志使之無所不慈無所不慈則物皆爲之衛矣善爲士章第六十八善爲士者不武士當以武爲本行之以怯若以武行武則死矣善戰者不怒聖人不得已而後戰若出於怒是以我故殺人也以我故殺人天必殃之善勝敵者不爭以吾不爭故能勝彼之爭若皆出於爭則未必勝矣善用人者爲之下人皆有相上之心故莫能相爲用誠能下之則天下皆吾用也是謂不爭之德是謂用人之力是謂配天古之極用兵有言章第六十九用兵有言吾不敢爲主而爲客主造事者也客應敵者也不敢進寸而退尺進者有意於爭者也退者無意於爭者也是謂行無行無意於爭則雖用兵與不用均也攘無臂仍無敵執無兵苟無意於爭則雖在軍旅如無臂可攘無敵可因無兵可執而安有用兵之咎邪禍莫大於輕敵輕敵者幾喪吾寳聖人以慈爲寳輕敵則輕戰輕戰則輕殺人喪其所以爲慈矣故抗兵相加哀者勝矣兩敵相加而吾出於不得已則有哀心哀心見而天人助之雖欲不勝不可得矣吾言甚易知章第七十吾言甚易知甚易行天下莫能知莫能行道之大復性而足而性之妙見於起居飲食之間耳聖人指此以示人豈不易知乎人能體此以應物豈不易行乎然世常患日用而不知知且不能而況行之乎言有宗事有君夫惟無知是以不我知言者道之筌也事者道之迹也使道可以言盡則聽言而足矣可以事見則考事而足矣惟言不能盡事不能見非舍言而求其宗遺事而求其君不可得也蓋古之聖人無思無爲而有漠然不自知者存焉此則思慮之所不及是以終莫吾知也知我者希則我者貴衆人之所能知亦不足貴矣是以聖人被褐懷玉聖人外與人同而中獨異耳知不知章第七十一知不知上不知知病道非思慮之所及故不可知然方其未知則非知無以入也及其既知而存知知則病矣故知而不知者上不知而知者病夫惟病病是以不病既不可不知又不可知唯知知之爲病者久而病自去矣聖人不病以其病病是以不病民不畏威章第七十二民不畏威則大威至夫性自有威高明光大赫然物莫能加此所謂大威也人常患溺於衆妄畏生死而憚得喪萬物之威雜然乗之終身惴慄之不暇雖有大威而不自知也苟誠知之一生死齊得喪坦然無所怖畏則大威熚然見於前矣無狹其所居無厭其所生夫惟不厭是以不厭性之大可以包絡天地彼不知者以四肢九竅爲己也守之而不厭是以見不出視聞不出聽蕞然其甚陋也故教之曰無狹其所居彼知之者知性之大而吾生之狹也則愀然厭之欲脱而不得不知有厭有慕之方囿於物也故教之曰無厭其所生夫惟聖人不狹不厭與人同生而與道同居無廣狹淨穢之辨既不厭生而後知生之無可厭也是以聖人自知不自見自愛不自貴故去彼取此聖人雖自知之而不自見以示人雖自愛之而不自貴以眩人恐人之有厭有慕也厭慕之心未忘則猶有畏也畏去而後大威至矣勇於敢章第七十三勇於敢則殺勇於不敢則活兩者或利或害天之所惡孰知其故是以聖人猶難之勇於敢則死勇於不敢則生此物理之大常也然而敢者或以得生不敢者或以得死世遂以僥倖其或然而忽其常理夫天道之遠其有一或然者孰知其好惡之所從來哉故雖聖人猶以常爲正其於勇敢未嘗不難之列子曰迎天意揣利害不如其已患天道之難知是以歷陳之也天之道不爭而善勝不與物爭於一時要於終勝之而已不言而善應天何言哉四時行焉百物生焉未有求而不應者也不召而自來神之格思不可度思矧可斁思夫又誰召之哉繟然而善謀繟然舒緩若無所營而其謀度非人所及也天網恢恢疏而不失世以耳目觀天見其一曲而不覩其大全有以善而得禍惡而得福者未有不疑天網之疏而多失也惟能要其終始而盡其變化然後知其恢恢廣大雖疏而不失也民不畏死章第七十四民常不畏死奈何以死懼之政煩刑重民無所措手足則常不畏死雖以死懼之無益也若使人常畏死而爲奇者吾得執而殺之孰敢民安於政常樂生畏死然後執其詭異亂群者而殺之孰敢不服哉常有司殺者殺司殺者天也方世之治而有詭異亂群之人恣行於其間則天之所棄也天之所棄而吾殺之則是天殺之而非我也夫代司殺者殺是代大匠斲夫代大匠斲希有不傷其手矣非天之所殺而吾自殺之是代司殺者殺也代大匠斲則傷其手代司殺者殺則及其身矣民之飢章第七十五民之飢以其上食稅之多是以飢民之難治以其上之有爲是以難治上以有爲導民民亦以有爲應之故事多而難治人之輕死以其生生之厚是以輕死上以利欲先民民亦爭厚其生故雖死而求利不厭夫惟無以生爲者是賢於貴生貴生之極必至於輕死惟無以生爲而生自全矣民之生章第七十六民之生也柔弱其死也堅强萬物草木生也柔弱其死也枯槁故堅强者死之徒柔弱者生之徒沖氣在焉則體無堅强之病至理在焉則事無堅强之累是以兵强則不勝兵以義勝者非强也强而不義其敗必速木强則共木自拱把以上必伐矣强大處下柔弱處上物之常理精者在上粗者在下其精必柔弱其粗必强大天之道章第七十七天之道其猶張弓乎張弓上筋弛弓上角故以況天之抑高舉下高者抑之下者舉之有餘者損之不足者補之天之道損有餘補不足人之道則不然損不足以奉有餘天無私故均人多私故不均孰能以有餘奉天下唯有道者有道者澹足萬物而不辭既以爲人己愈有既以子人己愈多非有道者無以堪此是以聖人爲而不恃功成不處其不欲見賢邪爲而恃成而處則賢見於世賢見於世則是以有餘自奉也天下柔弱章第七十八天下柔弱莫過於水而攻堅强者莫之能勝其無以易之故柔勝剛弱勝强天下莫不知莫能行是以聖人言受國之垢是謂社稷主受國不祥是謂天下王正言若反正言合道而反俗俗以受垢爲辱受不祥爲殃故也和大怨章第七十九和大怨必有餘怨安可以爲善夫怨生於妄而妄出於性知性者不見諸妄而又何怨乎今不知除其本而欲和其末故外雖和而内未忘也是以聖人執左契而不責於人故有德司契無德司徹契之有左右所以爲信而息爭也聖人與人均有是性人方以妄爲常馳騖於爭奪之場而不知性之未始少亡也是以聖人以其性示人使之除妄以復性待其妄盡而性復未有不廓然自得如右契之合左不待責之而自服也然則雖有大怨懟將涣然冰解知其本非有矣而安用和之彼無德者乃欲人人而通之則亦勞而無功矣徹通也天道無親常與善人天道無私惟善人則與之契之無私亦猶是也惟合者則得之矣小國寡民章第八十小國寡民老子生於衰周文勝俗弊將以無爲救之故於其書之終言其所志願得小國寡民以試焉而不可得爾使民有什伯之器而不用民各安其分則小有材者不求用於世什伯之器則財堪什夫伯夫之長者也雖有舟輿無所乗之雖有甲兵無所陳之使民復結繩而用之事少民朴雖結繩足矣甘其食美其服安其居樂其俗内足而外無所慕故以其所有爲美以其所處爲樂而不復求也鄰國相望雞犬之音相聞民至老死不相往來民物繁夥而不相求則彼此皆足故也信言不美章第八十一信言不美美言不信信則爲實而已故不必美美則爲觀而已故不必信善者不辯辯者不善以善爲主則不求辯以辯爲主則未必善知者不博博者不知有一以貫之則無所用博學而日益者未必知道也聖人無積既以爲人己愈有既以與人己愈多聖人抱一而已他無所積也然施其所能以爲人推其所有以與人人有盡而一無盡然後知一之爲貴也天之道利而不害聖人之道爲而不爭勢可以利人則可以害人矣力足以爲之則足以爭之矣能利能害而未嘗害能爲能爭而未嘗爭此天與聖人所以大過人而爲萬物宗者也凡此皆老子之所以爲書與其所以爲道之大略也故於終篇復言之道德眞經註卷之四予年四十有二謫居筠州筠雖小州而多古禪刹四方遊僧聚焉有道全者住黄糵山南公之孫也行高而心通喜從予遊嘗與予談道予告之曰子所談者予於儒書已得之矣全曰此佛法也儒者何自得之予曰不然予忝聞道儒者之所無何苦强以誣之顧誠有之而世莫知耳全曰儒佛之不相通如胡漢之不相諳也子亦何由知之試爲我言其略予曰孔子之孫子思子思之書曰中庸中庸之言曰喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之達道也致中和天地位焉萬物育焉此非佛法而何顧所從言之異耳全曰何以言之予曰六祖有言不思善不思惡方是時也孰是汝本來面目自六祖以來人以此言悟入者太半矣所謂不思善不思惡則喜怒哀樂之未發也蓋中者佛性之異名而和者六度萬行之總目也致中極和而天地萬物生於其間此非佛法何以當之全驚喜曰吾初不知也今而後始知儒佛一法也予笑曰不然天下固無二道而所以治人則異君臣父子之間非禮法則亂知禮法而不知道則世之俗儒不足貴也居山林木食澗飲而心存至道雖爲人天師可也而以之治世則亂古之聖人中心行道而不毁世法然後可耳全作禮曰此至論也是時予方解老子每出一章輒以示全全輒歎曰皆佛說也予居筠五年而北歸全不乆亦化去逮今二十餘年矣凡老子解亦時有所刊定未有不與佛法合者時人無可與語思復見全而示之故書之老子之末大觀二年十二月十日子由題
