body:
  text: 老子解卷上宋蘇轍撰道經道可道章第一道可道非常道莫非道也而可道不可常惟不可道而後可常耳今夫仁義禮智此道之可道者也然而仁不可以為義而禮不可以為智可道之不可常也惟不可道然後在仁為仁在義為義禮智亦然彼皆不常而道常不變不可道之能常如此名可名非常名道不可道而况可得而名之乎凡名皆其可道者也名既立則圓方曲直之不同不可常矣無名天地之始有名萬物之母故常無欲以觀其妙常有欲以觀其徼自其無名形而為天地天地位而名始矣自其有名播而為萬物萬物育而名不可勝載矣故無名者道之體而有名者道之用也聖人體道以為天下用入於衆有而常無將以觀其妙也體其至無而常有將以觀其徼也若夫行於徼而不知其妙則麤而不神留于妙而不知其徼則精而不變矣此兩者同出而異名同謂之𤣥以形而言有無信兩矣安知無運而為有有復而為無未嘗不一哉其名雖異其本則一知本之一也則𤣥矣凡逺而無所至極者其色必𤣥故老子常以𤣥寄極也𤣥之又𤣥衆妙之門言𤣥則至矣然猶有𤣥之心在焉𤣥之又𤣥則盡矣不可以有加矣衆妙之所從出也天下皆知章第二天下皆知美之為美斯惡已皆知善之為善斯不善已故有無相生難易相成長短相形髙下相傾音聲相和前後相隨天下以形名言美惡其所謂美且善者豈真美且善哉彼不知有無難易髙下聲音前後之相生相奪皆非其正也方且自以為長而有長于我者臨之斯則短矣方且自以為前而有前于我者先之斯則後矣茍從其所美而信之則失之逺矣是以聖人處無為之事行不言之教當事而為無為之之心當教而言無言之之意夫是以出于長短之度離于先後之數非美非惡非善非不善而天下何足以知之萬物作焉而不辭生而不有為而不恃功成而弗居萬物為我作而我無所辭我生之為之而未嘗有未嘗恃至於成功亦未嘗以自居也此即無為不言之報聖人且不知其美且善也豈復有惡與不善繼之哉夫惟弗居是以弗去聖人居于貧賤而無貧賤之憂居于富貴而無富貴之累此所謂不居也我且不居彼尚何從去哉此則居之至也不尚賢章第三不尚賢使民不爭不貴難得之貨使民不為盜不見可欲使心不亂是以聖人之治虚其心實其腹弱其志強其骨尚賢則民恥于不若而至于爭貴難得之貨則民病于無有而至于盜見可欲則民患于不得而至于亂雖然天下知三者之為患而欲舉而廢之則惑矣聖人不然未嘗不用賢也獨不尚之耳未嘗棄難得之貨也獨不貴之耳未嘗去可欲也獨不見之耳夫是以賢者用而民不爭難得之貨可欲之事畢効于前而盜賊禍亂不起是不亦虚其心而不害腹之實弱其志而不害骨之強也哉今將舉賢而尚之寳貨而貴之可欲以示之則是心與腹皆實也若舉而廢之則是志與骨皆弱也心與腹皆實則民爭志與骨皆弱則無以立矣常使民無知無欲使夫知者不敢為也不以三者之則民不知所慕澹然無欲雖有智者無所用巧矣為無為則無不治因三者之自然而不尚不貴不見所謂為無為也道沖章第四道沖而用之或不盈淵乎似萬物之宗夫道沖然至無耳然以之適衆有雖天地之大山河之廣無所不徧以其無形故似不盈者淵兮深眇吾知其為萬物宗也而不敢正言之故曰似萬物之宗挫其鋭解其紛和其光同其塵湛兮似若存人莫不有道也而聖人能全之挫其鋭恐其流于妄也解其紛恐其與物搆也不流于妄不搆于物外患已去而光生焉又從而和之恐其與物異也光至潔也塵至雜也雖塵無所不同恐其棄萬物也如是而後全則湛然常存矣雖存而人莫之識故曰似或存耳吾不知誰之子象帝之先道雖常存終莫得而名然亦不可謂無也故曰此豈帝之先帝先矣而又先于帝則莫或先之者矣天地不仁章第五天地不仁以萬物為芻狗聖人不仁以百姓為芻狗天地無私而聽萬物之自然故萬物自生自死死非吾虐之生非吾仁之也譬如結芻以為狗設之于祭祀盡飾以奉之夫豈愛之時適然也既事而棄之行者踐之夫豈惡之亦適然也聖人之于民亦然特無以害之則民全其性死生得䘮吾無與焉雖未仁之而仁亦大矣天地之間其猶槖籥乎虚而不屈動而愈出排之有槖與籥也方其一動氣之所及無不靡也不知者以為機巧極矣然槖籥則何為哉葢亦虚而不屈是以動而愈出耳萬物化之始至于天地之間其所以生殺萬物彫刻衆形者亦若是而已矣多言數窮不如守中見其動而愈出不知其為虚中之報也故告之以多言數窮不如守中之不窮也谷神不死章第六谷神不死是謂𤣥牝谷至虚而猶有形谷神則虚而無形也虚而無形尚無有生安有死邪謂之谷神言其徳也謂之𤣥牝言其功也牝生萬物而謂之𤣥焉言見其生之而不見其所以生也𤣥牝之門是謂天地根𤣥牝之門言萬物自是出也天地根言天地自是生也綿綿若存用之不勤綿綿㣲而不絶也若存存而不可見也能如是雖終日用之而不勞矣天長地久章第七天長地久天地雖大而未離于形數則其長久葢有量矣然老子之言長久極于天地葢以人所見者言之耳若夫長久之至則所謂天地始者是也天地所以能長且久者以其不自生故能長生是以聖人後其身而身先外其身而身存非以其無私邪故能成其私天地生物而不自生立於萬物之外故能長生聖人後其身而先人外其身而利人處于衆人之表故能先能存如使天地與物競生聖人與人爭得則天地亦一物耳聖人亦一人耳何以大過之哉雖然彼其無私非求以成私也而私以之成道則固然耳上善若水章第八上善若水水善利萬物而不爭處衆人之所惡故幾于道易曰一隂一陽之謂道繼之者善也成之者性也又曰天以一生水葢道運而為善猶氣運而生水也故曰上善若水二者皆自無而始成形故其理同道無所不在無所不利而水亦然然而既已麗于形則于道有間矣故曰幾于道然而可名之善未有若此者也故曰上善居善地心善淵與善仁言善信政善治事善能動善時避髙趨下未嘗有所逆善地也空虚靜黙深不可測善淵也利澤萬物施而不求報善仁也圓必旋方必折塞必止決必流善信也洗滌羣穢平準髙下善治也遇物賦形而不留于一善能也冬凝春泮涸溢不失節善時也夫惟不爭故無尤有善而不免于人非者以其爭也水惟不爭故兼七善而無尤持而盈之章第九持而盈之不如其巳揣而鋭之不可長保知盈之必溢而以持固之不若不盈之安也知鋭之必折而以揣先之不知揣之不可必恃也若夫聖人有而不有尚安有盈循理而後行尚安有鋭無盈則無所用持無鋭則無所用揣矣金玉滿堂莫之能守富貴而驕自遺其咎功成名遂身退天之道日中則移月滿則虧四時之運成功者去天地尚然而況于人乎載營魄章第十載營魄抱一能無離魄之所以異于魂者魄為物魂為神也易曰精氣為物逰魂為變是故知鬼神之情狀魄為物故雜而止魂為神故一而變謂之營魄言其止也葢道無所不在其于人為性而性之妙為神言其純而未雜則謂之一言其聚而未散則謂之樸其歸皆道各從其實言之耳聖人性定而神凝不為物遷雖以魄為舍而神所欲行魄無不從則神常載魄矣衆人以物役性神昏而不治則神聽於魄耳目困以聲色鼻口勞於臭味魄所欲行而神從之則魄常載神矣故教之以抱神載魄使兩者不相離此固聖人所以修身之要至於古之真人深根固蔕長生久視其道亦由是也專氣致柔能孾兒神不治則氣亂彊者好鬭弱者喜畏不自知也神治則氣不妄作喜怒各以其𩔖是之謂專氣神虚之至也氣實之始也虛之極為柔實之極為剛純性而亡氣是之謂致柔孾兒不知好惡是以性全性全而氣㣲氣㣲而體柔專氣致柔如孾兒極矣滌除𤣥覽能無疵聖人外不為魄所載内不為氣所使則其滌除塵垢盡矣於是其神廓然𤣥覽萬物知其皆出于性等觀淨穢而無所瑕疵矣愛民治國能無為既以治身又推其餘以及人雖至於治國愛民一以無心遇之茍其有心則愛民者適以害之治國者適以亂之也天門開闔能為雌天門者治亂廢興所從出也既以身任天下方其開闔變會之間衆人貴得而患失則先是以邀福聖人循理而知天命則待唱而後和易曰先天而天弗違非先天也後天而奉天時非後天也言其先後常與天命會耳不然先者必蚤後者必莫皆失之矣故所謂能為雌者亦不失時而已明白四逹能無知内以治身外以治國至於臨變莫不有道也非明白四逹而能之乎明白四逹心也是心無所不知然而未甞有能知之心也夫心一而已茍又有知之者則是二也自一而二蔽之所自生而愚之所自始也今夫鏡之於物來而應之則巳又安得知應物者乎本則無有而以意加之此妄之源也生之畜之生而不有為而不恃長而不宰是謂𤣥徳其道既足以生畜萬物又能不有不恃不宰雖有大徳而物莫之知也故曰𤣥徳三十輻章第十一三十輻共一轂當其無有車之用埏埴以為器當其無有器之用鑿户牖以為室當其無有室之用故有之以為利無之以為用竭智盡物以為器而器之用常在無有中非有則無無以致其用非無則有無以施其利是以聖人常無以觀其妙常有以觀其徼知兩者之為一而不可分則至矣五色章第十二五色令人目盲五音令人耳聾五味令人口爽視色聽音甞味其本皆出于性方其有性而未有物也至矣及目緣五色耳緣五音口緣五味奪于所縁而忘其本則雖見而實盲雖聞而實聾雖甞而實爽也馳騁田獵令人心發狂難得之貨令人行妨是以聖人為腹不為目故去彼取此聖人視色聽音甞味皆與人同至于馳騁田獵未甞不為而難得之貨未甞不用也然人皆以為病而聖人獨以為福何也聖人為腹而衆人為目目貪而不能受腹受而未甞貪故也彼物之自外至者也此性之凝于内者也寵辱章第十三寵辱若驚貴大患若身古之逹人驚寵如驚辱知寵之為辱先也貴身如貴大患知身之為患本也是以遺寵而辱不及忘身而患不至何謂寵辱寵為下得之若驚失之若驚是謂寵辱若驚所謂寵辱非兩物也辱生于寵而世不悟以寵為上而以辱為下者皆是也若知辱生于寵則寵固為下矣故古之逹人得寵若驚失寵若驚未甞安寵而驚辱也所謂若驚者非實驚也若驚而已何謂貴大患若身吾所以有大患者為吾有身及吾無身吾有何患貴之為言難也有身大患之本而世之士難于履大患不難于有其身故聖人因其難于履患而教之以難于有身知有身之為難而大患去矣性之于人生不能加死不能損其大可以充塞天地其精可以蹈水火入金玉凡物莫能患也然天下常患亡失本性而惟身之為見愛身之情篤而物始能患之矣生死病疾之變攻之於内寵辱得失之交攖之於外未有一物而非患也夫惟逹人知性之無壞而身之非實忽然忘身而天下之患盡去然後可以渉世而無累矣故貴以身為天下者則可寄于天下愛以身為天下者乃可託于天下人之所以騖于權利溺于富貴犯難而不悔者將以厚其身耳今也祿之以天下而重以身任之則其忘身也至矣如此而以天下予之雖天下之大不能患之矣視之不見章第十四視之不見名曰夷聽之不聞名曰希摶之不得名曰㣲此三者不可致詰故混而為一視之而見者色也所以見色者不可見也聽之而聞者聲也所以聞聲者不可聞也摶之而得者觸也所以得觸者不可得也此三者雖智者莫能詰也要必混而歸于一而可耳所謂一者性也三者性之用也人始有性而已及其與物搆然後分裂四出為視為聽為觸日用而不知反其本非復混而為一則日逺矣若推廣之則佛氏所謂六入皆然矣首楞嚴有云反流全一六用不行此之謂也其上不皦其下不昧物之有形者皆麗于隂陽故上皦下昧不可迯也道雖在上而不皦雖在下而不昧難以形數推也繩繩兮不可名復歸于無物繩繩運而不絶也人見其運而不絶則以為有物矣不知為卒歸于無也是謂無狀之狀無象之象是謂惚恍狀其著也象其㣲也無狀之狀無象之象皆非無也有無不可名故謂之惚恍迎之不見其首隨之不見其後道無所不在故無前後可見執古之道以御今之有能知古始是謂道紀古者物之所從生也有者物之今則無者物之古也執其所從生則進退疾徐在我矣古之善為士章第十五古之善為士者㣲妙𤣥通深不可識麤盡而㣲微而妙妙極而𤣥𤣥則無所不通而深不可識矣夫惟不可識故強為之容與一作豫兮若冬渉川戒而後動曰豫其所欲為猶迫而後應豫然若冬渉川逡巡如不得已也猶兮若畏四鄰疑而不行曰猶其所不欲遲而難之猶然如畏四鄰之見之也儼兮其若客無所不敬未甞惰也渙兮若冰之將釋知萬物之出于妄未甞有所留也敦兮其若樸人偽已盡復其性也曠兮其若谷虚而無所不受也渾兮其若濁和其光同其塵不與物異也孰能濁以静之徐清孰能安以久動之徐生世俗之士以物汨性則濁而不復清枯槁之士以定滅性則安而不復生今知濁之亂性也則静之靜之而徐自清矣知滅性之非道也則動之動之而徐自生矣易曰寂然不動感而遂通天下之故今所謂動者亦若是耳保此道者不欲盈盈生於極濁而不能清安而不能生所以盈也夫惟不盈故能弊不新成物未有不弊者也夫惟不盈故其弊不待新成而自去致虛極章第十六致虚極守靜篤致虚不極則有未亡也守靜不篤則動未亡也丘山雖去而微塵未盡未為極與篤也葢致虚存虚猶未離有守靜存靜猶限于動而況于他乎不極不篤而責虚靜之用難也萬物竝作吾以觀其復虚極靜篤以觀萬物之變然後不為變之所亂知凡作之未有不復也茍吾方且與萬物皆作則不足以知之矣夫物芸芸各復歸其根萬物皆作于性皆復于性譬如華葉之生于根而歸于根濤瀾之生于水而歸于水歸根曰靜茍未能自復于性雖止動息念以求靜非靜也故惟歸根然後為靜是謂復命命者性之妙也性可言至于命則不可言矣易曰窮理盡性以至于命聖人之學道必始于窮理中于盡性終于復命仁義禮樂聖人之所以接物也而仁義禮樂之用必有所以然者不知其所以然而為之世俗之士也知其所以然而後行之君子也此之謂窮理雖然盡心以窮理而後得之不求則不得也事物日搆于前必求而後能應則其為力也勞而其為功也少聖人外不為物所蔽其性湛然不勉而中不思而得物至而能應此之謂盡性雖然此吾性也猶有物我之辨焉則幾于妄矣君之命曰命天之命曰命以性接物而不知其為我是以寄之命也此之謂復命復命曰常方其作也雖天地山河之大未有不變壞不常者惟復于性而後湛然常存矣知常曰明不以復性為明則皆世俗之智雖自謂明非明也不知常妄作凶不知復性則縁物而動無作而非凶雖得于一時而失之逺矣知常容方迷于妄則自是而非彼物皆吾敵吾何以容茍知其皆妄則雖仇讎猶將哀而憐之何所不容哉容乃公無所不容則彼我之情盡而尚誰私乎公乃王無所不公則天下將往而歸之矣王乃天無所不懐雖天何以加之天乃道天猶有形至於道則極矣然而雖道亦不能復進於此矣道乃久没身不殆太上章第十七太上下知有之以道化育天下而未甞治之民不知其所以然故亦有之而已其次親之譽之以仁義治天下其徳可懐其功可見故民得而親譽之其名雖美而厚薄自是始矣其次畏之其次侮之以政齊民民非不畏也然力之所不及則侮之矣故信不足焉有不信吾誠自信則以道御天下足矣唯不自信以加之仁義而重之刑政而民始不信猶兮其貴言功成事遂百姓皆謂我自然聖人自信有餘其於言也猶然貴之不輕出諸口而民信之矣及其功成事遂也則民日遷善逺罪而不自知矣大道章第十八大道廢有仁義大道之隆也仁義行於其中而民不知大道廢而後仁義見矣智慧出有大偽世不知道之足以統御萬物也而以智慧加之于是民始以偽報之矣六親不和有孝慈國家昏亂有忠臣六親方和孰非孝慈國家方治孰非忠臣堯非不孝也而獨稱舜無瞽瞍也伊尹周公非不忠也而獨稱龍逄比干無桀紂也涸澤之魚相呴以沫相濡以濕不如相忘于江湖絶聖棄智章第十九絶聖棄智民利百倍非聖智不足以知道使聖智為天下其有不以物者乎然世之人不足以知聖智之本而見其末以為巧勝物者也于是馳騁于其末流而民始不勝其害矣故絶聖棄智民利百倍絶仁棄義民復孝慈未有仁而遺其親者也未有義而後其君者也仁義所以為孝慈矣然及其衰也竊仁義之名以要利于世于是子有違父而父有虐子此則仁義之迹為之也故絶仁棄義則民復孝慈絶巧棄利盜賊無有巧所以便事也利所以濟物也二者非以為盜而盜賊不得則不行故絶巧棄利盜賊無有也此三者以為文不足故令有所屬見素抱樸少私寡欲世之貴此三者以為天下之不安由文之不足故也是或屬之聖知或屬之仁義或屬之巧利葢將以文治之也然而天下益以不安曷不反其本乎見素抱樸少私寡欲而天下各復其性雖有三者無所用之矣故曰我無為而民自化我好靜而民自正我無事而民自富我無欲而民自樸此則聖智之大仁義之至巧利之極也然孔子以仁義禮樂治天下老子絶而棄之或者以為不同易曰形而上者謂之道形而下者謂之器孔子之慮後世也深故示人以器而晦其道使中人以下守其器不為道之所眩以不失為君子而中人以上自是以上逹也老子則不然志于明道夫道不可言可言皆其似者也逹者因偽以識真而昧者執似以陷于大過故後世執老子之言以亂天下者有之而學孔子者無大過因老子之言以逹道者不少而求之于孔子者常苦其無所從入二聖人者皆不得已也全于此必略于彼矣絶學無憂章第二十絶學無憂為學日益為道日損不知性命之正而以學求益増所未聞積之未巳而無以一之則以圜害方以直害曲其中紛然不勝其憂矣患夫學者之至此故曰絶學無憂若夫聖人未甞不學而以道為主不學而不少多學而不亂廓然無憂安用絶學邪唯之與阿相去幾何善之與惡相去何若學者溺于所聞而無以一之則唯之為恭阿之為慢不可同日言矣而況夫善惡之相反乎夫惟聖人知萬物同出于性而皆成于妄如畫馬牛如刻虎彘皆非其實泯焉無是非同異之辨孰知其相去幾何哉茍如此矣則萬物竝育而不相害道竝行而不相悖無足怪矣人之所畏不可不畏聖人均彼我一同異其心無所復留然豈以是忽遺世法犯分亂理而不顧哉人之所畏吾亦畏之人之所為吾亦為之雖列于君臣父子之間行于禮樂刑政之域而天下不知其異也其所以不攖于物者惟心而已荒兮其未央哉人皆狥其所知故介然不出畦畛聖人兼渉有無無入而不可則荒兮其未可央也衆人熈熈如享太牢如春登䑓我獨泊兮其未兆如嬰兒之未孩人各溺于所好其美如享太牢其樂如春登䑓囂然從之而不知其非唯聖人深究其妄遇之泊然不動如孾兒之未能孩也乘乘兮若無所歸乘萬物之理而不自私故若無所歸衆人皆有餘而我獨若遺衆人守其所知各自以為有餘聖人包舉萬物而不主于一超然其若遺也我愚人之心也哉沌沌兮沌沌若愚而非愚也俗人昭昭我獨若昏俗人察察我獨悶悶世俗以分别為智聖人知羣妄之不足辨也故其外若昏其中若悶忽兮若海漂兮若無所止忽然若海不見其津涯漂然無定不見其止宿衆人皆有以而我獨頑且鄙人各有能故世皆得而用之聖人才全徳備若無所施故疑于頑鄙我獨異于人而貴求食于母道者萬物之母衆人狥物忘道而聖人脱遺萬物以道為宗譬如孾兒無所雜食食于母而已孔徳之容章第二十一孔徳之容惟道是從道無形也及其運而為徳則有容矣故徳者道之見自是推之則衆有之容皆道之見于物者也道之為物惟恍惟惚惚兮恍其中有象恍兮惚其中有物道非有無故以恍惚言之然極其運而成象著而成物未有不出于恍惚者也窈兮㝠兮其中有精方無有之未定恍惚而不可見及夫有無之交則見其窈㝠深眇雖未成形而精存乎其中矣其精甚真其中有信物至於成形則真偽雜矣方其有精不容偽也真偽既雜自一而為二自二而為三紛然錯出不可復信矣方其有精不吾欺也自古及今其名不去以閲衆甫古今雖異而道則不去故以不去名之惟未甞去故能以閲衆有之變矣甫美也雖萬物之美不免于變也吾何以知衆甫之然哉以此聖人之所以知萬物之所以然者以能體道而不去故也曲則全章第二十二曲則全聖人動必循理理之所在或直或曲要于通而已通故與物不迕不迕故全也枉則直直而非理則非直也循理雖枉而天下之至直也窪則盈衆之所歸者下也雖欲不盈不可得矣弊則新昭昭察察非道也悶悶若將弊矣而日新之所自出也少則得道一而已得一則無不得矣多則惑多學而無以一之則惑矣是以聖人抱一為天下式抱一者復性者也葢曲則全枉則直窪則盈弊則新少則得多則惑皆抱一之餘也故以抱一終之不自見故明目不自見故能見物鏡不自照故能照物如使自見自照則自為之不暇而何暇及物哉不自是故彰不自伐故有功不自矜故長夫惟不爭故天下莫能與之爭不自見不自是不自伐不自矜皆不爭之餘也故以不爭終之古之所謂曲則全者豈虚言哉誠全而歸之世以直為是以曲為非將循理而行于世則有不免於曲者矣故終篇復言之曰此豈虚言哉誠全而歸之夫所謂全者非獨全身也内以全身外以全物物我兼全而復于性則其為直也大矣希言自然章第二十三希言自然言出于自然則簡而中非其自然而強言之則煩而難信矣故曰道之出口澹乎其無味視之不足見聽之不足聞用之不可既此之所謂希言矣飄風不終朝驟雨不終日孰為此者天地天地尚不能久而況于人乎隂陽不爭風雨時至不疾不徐盡其勢之所至而後止若夫陽亢于上隂伏于下否而不得洩于是為飄風暴雨若將不勝然其勢不能以終日古之聖人言出于希行出于夷皆因其自然故久而不窮世或厭之以為不若詭辨之悦耳怪行之驚世不知其不能久也故從事于道者道者同于道徳者同于徳失者同于失同于道者道亦樂得之同于徳者徳亦樂得之同于失者失亦樂得之孔子曰茍志于仁矣無惡也志于仁猶若此而況于志于道者乎夫茍從事于道矣則其所為合于道者得道合于徳者得徳不幸而失雖失于所為然必有得于道徳矣信不足焉有不信焉不知道者信道不篤因其失而疑之于是益以不信夫惟知道然後不以得失疑道也者不立章第二十四跂者不立跨者不行自見者不明自是者不彰自伐者無功自矜者不長人未有不能立且行者也茍以立為未足而加之以跂以行為未足而加之以跨未有不喪失其行立者彼其自見自是自矜自伐者亦若是矣其于道也曰餘食贅行譬如飲食適飽則己有餘則病譬如四體適完則己有贅則累物或惡之故有道者不處也有物混成章第二十五有物混成先天地生夫道非清非濁非髙非下非去非來非善非惡混然而成體其于人為性故曰有物混成此未有知其生者葢湛然常存而天地生于其中耳寂兮寥兮獨立而不改周行而不殆可以為天下母寂兮無聲寥兮無形獨立無匹而未甞變行于羣有而未甞殆俯以化育萬物則皆其母矣吾不知其名字之曰道強為之名曰大道本無名聖人見萬物之無不由也故字之曰道見萬物之莫能加也故強為之名曰大然其實則無得而稱之也大曰逝逝曰逺逺曰反自大而求之則逝而往矣自往而求之則逺不及矣雖逝雖逺然反而求之一心足矣故道大天大地大王亦大域中有四大而王居其一焉人法地地法天天法道道法自然由道言之則雖天地與王皆未足大也然世之人習知三者之大而不信道之大也故以實告之人不若地地不若天天不若道道不若自然然使人一日復性則此三者人皆足以盡之矣重為輕根章第二十六重為輕根靜為躁君凡物輕不能載重小不能鎮大不行者使行不動者制動故輕以重為根躁以靜為君是以聖人終日行不離輺重雖有榮觀燕處超然行欲輕而不離輜重榮觀雖樂而必有燕處重靜之不可失如此柰何萬乗之主而以身輕天下人主以身任天下而輕其身則不足以任天下矣輕則失臣躁則失君輕與躁無施而可然君輕則臣知其不足賴臣躁則君知其志于利故曰輕則失臣躁則失君善行無轍迹章第二十七善行無轍迹乘理而行故無迹善言無瑕讁時然後言故言滿天下無口過善計不用籌策萬物之數畢陳于前不計而知安用籌算善閉無關鍵而不可開善結無繩約而不可解全徳之人其于萬物如母之于子雖縱之而不去故無關而能閉無繩而能約是以聖人常善救人故無棄人常善救物故無棄物彼方執䇿以計設關以閉持繩以結其力之所及者少矣聖人之于人非特容之又善救之我不棄人而人安得不歸我乎是謂襲明救人于危難之中非救之大者也方其流轉生死為物所蔽而推吾至明以與之使暗者皆明如燈相傳相襲而不絶則謂善救人矣故善人者不善人之師不善人者善人之資不貴其師不愛其資聖人無心于教故不愛其資天下無心于學故不貴其師聖人非獨吾忘天下能使天下忘我故也雖智大迷是謂要妙聖人之妙雖智者有所不諭也知其雄章第二十八知其雄守其雌為天下谿為天下谿常徳不離復歸于孾兒知其白守其黑為天下式為天下式常徳不忒復歸于無極知其榮守其辱為天下谷為天下谷常徳乃足復歸于朴雄雌先後之及我者也白黒明暗之及我者也榮辱貴賤之及我者也夫欲先而惡後欲明而惡暗欲貴而惡賤物之情也然而先後之及我不若明暗之切明暗之及我不若貴賤之深古之聖人去妄以求復性其性愈明則其守愈下其守愈下則其徳愈厚其徳愈厚則其歸愈大葢不知而不為不若知而不為之至也知其雄守其雌知性者也知性而爭心止則天下之爭先者皆將歸之如水之赴谿莫有去者雖然譬如孾兒能受而未能用也故曰復歸于孾兒知其白守其黑見性者也居暗而視明天下之明者皆不能以形逃也故衆明則之以為法雖應萬物而法未甞差用未甞窮也故曰復歸于無極知其榮守其辱復性者也諸妄已盡處辱而無恨曠兮如谷之虚物來而應之徳足于此純性而無雜矣故曰復歸于朴朴散則為器聖人用之則為官長故大制不割聖人既歸于朴復散朴而為器以應萬物譬如人君分政以立官長亦因其勢之自然雖制而非有所割裂也將欲取天下章第二十九將欲取天下而為之吾見其不得已聖人之有天下非取之也萬物歸之不得已而受之其治天下非為之也因萬物之自然而除其害耳若欲取而為之則不可得之矣天下神器不可為也為者敗之執者失之凡物皆不可為也雖有百人之聚不循其自然而妄為之必有齟齬不服者而況天下乎雖然小物寡衆猶有可以力取而智奪者至于天下之大有神主之不待其自歸則叛不聽其自治則亂矣故物或行或隨或呴或吹或強或羸或載或隳是以聖人去甚去奢去泰隂陽相蕩髙下相傾大小相使或行于前或隨于後或呴而煖之或吹而寒之或益而強之或損而羸之或載而成之或隳而毁之皆物之自然而勢之不免者也然世之愚人私巳而務得乃欲拒而違之其禍不覆則折唯聖人則知其不可逆順以待之去其甚去其奢去其泰使不至于過而傷物而天下無患矣此不為之至也堯湯之于水旱雖不能免而終不至于敗者由此故也易之泰曰后以裁成天地之道輔相天地之宜以左右民三陽在内三隂在外物之泰極矣聖人懼其過而害生故裁成而輔相之使不至于過此所謂去甚去奢去泰也以道佐人主章第三十以道佐人主者不以兵強天下其事好還聖人用兵皆出于不得已而欲以強勝天下雖或能勝其禍必還報之楚靈齊湣秦始皇漢孝武或以殺其身或以禍子孫人之所毒鬼之所疾未有得免之者也師之所處荆棘生焉大軍之後必有凶年兵之所在民事廢故田不脩用兵之後殺氣勝故年榖傷凡兵皆然而況以兵強者善者果而已不敢以取強果決也徳所不能綏政所不能服不得已而後以兵決之耳果而勿矜果而勿伐果而勿驕果而不得已果而勿強勿矜勿伐勿驕不得已四者所以勿強也物壯則老是謂不道不道早已壯之必老物無不然者唯有道者成而若缺盈而若沖未甞壯故未甞老未甞死以兵強天下壯矣能無老乎無死乎夫佳兵章第三十一夫佳兵不祥之器物或惡之故有道者不處以之濟難而不以為常是謂不處君子居則貴左用兵則貴右兵者不祥之器非君子之器不得已而用之恬澹為上勝而不美而美之者是樂殺人夫樂殺人者則不可以得志于天下矣吉事尚左凶事尚右偏將軍居左上將軍居右言居上勢則以喪禮處之殺人衆多以悲哀泣之戰勝以喪禮處之道常無名章第三十二道常無名朴雖小天下不敢臣侯王若能守萬物將自賔樸性也道常無名則性亦不可名矣故其為物舒之無所不在而歛之不盈毫末此所以雖小而不可臣也故匹夫之賤守之則塵垢粃糠足以陶鑄堯舜而侯王之尊不能守則萬物不賔矣天地相合以降甘露民莫之令而自均沖氣升降相合為一而降甘露脗然被萬物無不均徧聖人體至道以應諸有亦如露之無不及者此所以能賔萬物也始制有名名亦既有夫亦將知止知止所以不殆聖人散朴為器因器制名豈其狥名而忘朴逐末而喪本哉葢亦知復于性是以乗萬物而不殆也譬道之在天下猶川谷之於江海也江海水之鍾也川谷水之分也道萬物之宗也萬物道之末也皆水也故川谷歸其所鍾皆道也故萬物賔其所宗知人者智章第三十三知人者智自知者明分别為智蔽盡為明分别之心未除故止于知人而不能自知蔽盡則無分别故能自知而後可以及人也勝人者有力自勝者強力能及人而不能及我能克巳復性則非力之所及故可謂之強也知足者富知足者所遇而足則未甞不富矣雖有天下而常挾不足之心以處之則是終身不能富也強行者有志不與物爭而自強不息物莫能奪其志也不失其所者久物變無窮而心未甞失則久矣死而不亡者壽死生之變亦大矣而其性湛然不亡此古之至人能不生不死者也大道汜兮章第三十四大道汜兮其可左右汜兮無可無不可故左右上下周旋無不至也萬物恃之以生而不辭功成不名有世有生物而不辭者必將名之以為已有世有避物而不有者必將辭物而不生生而不辭成而不有者唯道而已愛養萬物而不為主常無欲可名于小萬物歸焉而不為主可名為大是以聖人終不為大故能成其大大而有為大之心則小矣執大象章第三十五執大象天下往道非有無故謂之大象茍其昭然有形則有同有異同者好之異者惡之好之則來惡之則去不足以使天下皆往矣往而不害安平泰有好有惡則有所利有所害好惡既盡則其于萬物皆無害矣故王者無不安無不平無不泰樂與餌過客止道之出口淡乎其無味視之不足見聽之不足聞用之不可既作樂設餌以待來者豈不足以止過客哉然而樂闋餌盡彼將捨之而去若夫執大象以待天下天下不知好之而況得而惡之乎雖無臭味形色聲音以悦人而其用不可盡矣將欲噏之章第三十六將欲噏之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之是謂微明未甞與之而遽奪則勢有所不極理有所不足勢不極則取之難理不足則物不服然此幾于用智也與管仲孫武何異聖之與世俗其迹固有相似者也聖人乘理而世俗用智乘理如醫藥巧于應病用智如商賈巧于射利柔弱勝剛強聖人知剛強之不足恃故以柔弱自處天下之剛強方相傾相軋而吾獨柔弱以待之及其大者傷小者死而吾以不校坐待其弊此所謂勝也雖然聖人豈有意為此以勝物哉知勢之自然而居其自然耳魚不可脱于淵國之利器不可以示人魚之為利非有爪牙之利足以勝物也方其託于深淵雖強有力者莫能執之及其脱淵而陸則蠢然一物耳何能為哉聖人居于柔弱而剛強者莫能傷非徒莫能傷也又將以前制其後此不亦天下之利器哉魚惟脱于淵然後人得制之聖人惟處于柔弱而不厭故終能服天下此豈與衆人共之者哉道常無為章第三十七道常無為而無不為無所不為而無為之之意耳侯王若能守萬物將自化化而欲作吾將鎮之以無名之朴聖人以無為化物化之始于無為而為而漸至于作譬如孾兒之長人偽日故三代之衰人情之變日以益甚方其欲作而上之人與天下皆靡故其變至有不可勝言者茍其方作而不為之動終以無名之朴鎮之庶幾可得而止也無名之朴亦將不欲不欲以靜天下將自定聖人中無抱朴之念外無抱朴之迹故朴全而用大茍欲朴之心尚存于胷中則失之逺矣老子解卷上
