body:
  text: 老子解卷下宋蘇轍撰徳經上徳不徳章第三十八上德不德是以有德下德不失德是以無德聖人從心所欲不踰矩非有意于德而德自足其下知徳之貴勉强以求不失蓋僅自完耳而何德之有上德無為而無以為下德為之而有以為無為而有以為之則猶有為也唯無為而無以為者可謂無為矣其下非為不成然猶有以為之非徒作而無術者也上仁為之而無以為上義為之而有以為仁義皆不免于為之矣其所以異者仁以無以為為勝義以有以為為功耳德有上下而仁義有上無下何也下德在仁義之間而仁義之下者不足復言故也上禮為之而莫之應則攘臂而仍之自徳以降而至于禮聖人之所以齊民者極矣故為之而不應則至于攘臂而强之强之而又不應于是刑罰興而兵甲起則徒作而無術矣故失道而後徳失徳而後仁失仁而後義失義而後禮夫禮者忠信之薄而亂之首忠信而無禮則忠信不見禮立而忠信之美發越於外君臣父子之間夫婦朋友之際其外燦然而中無餘矣故順之則治違之則亂治亂之相去其間不能以髪故曰亂之首也前識者道之華而愚之始聖人𤣥覽萬物是非得失畢陳于前如鑑之照形無所不見而孰為前後世人視止于目聽止于耳思止于心㝠行于萬物之間役智以求識而偶有見焉雖自以為明而不知至愚之自始也是以大丈夫處其厚不居其薄處其實不居其華故去彼取此世之鄙夫樂其有得于下而忘其上故喜薄而遺厚采華而棄實非大丈夫孰能去彼取此昔之得一者章第三十九昔之得一者天得一以清地得一以寜神得一以靈谷得一以盈萬物得一以生侯王得一以為天下貞一道也物之所以得為物者皆道也天下之人見物而忘道天知其清而已地知其寧而已神知其靈而已谷知其盈而已萬物知其生而已侯王知其為天下貞而已不知其所以得此者皆道存焉耳其致之一也天無以清將恐裂地無以寧將恐發神無以靈將恐歇谷無以盈將恐竭萬物無以生將恐滅侯王無以貞而貴髙將恐蹶致之言極也天不得一未遽裂也地不得一未遽發也神不得一未遽歇也萬物不得一未遽滅也侯王不得一未遽蹶也然其極必至此耳故貴以賤為本高以下為基天地之大侯王之貴皆一之致夫一果何物也視之不見執之不得則亦天地之至微也此所謂賤且下也是以侯王自謂孤寡不穀此其以賤為本耶非乎昔之為此稱者亦舉其本而遺其末耳故致數車無車不欲琭琭如玉落落如石輪輻蓋軫衡軛轂轊㑹而為車物物可數而車不可數然後知無有之為車所謂無之以為用者也然則天地將以大為天地耶侯王將以貴為侯王耶大與貴之中有一存焉此其所以為天地侯王者而莫或知之耳故一處貴而非貴處賤而非賤非若玉之琭琭貴而不能賤石之落落賤而不能貴也反者道之動章第四十反者道之動復性則靜矣然其寂然不動感而遂通天下之故則動之所自起也弱者道之用道無形無聲天下之弱者莫如道然而天下之至强莫加焉此其所以能用萬物也天地萬物生于有有生于無世不知靜之為動弱之為强故告之以物之所自生者蓋天下之物聞有母制子未聞有以子制母者也上士聞道章第四十一上士聞道勤而行之中士聞道若存若亡下士聞道大笑之不笑不足以為道道非形不可見非聲不可聞不先知萬物之妄廓然無蔽卓然有見未免于不信也故下士聞道以為荒唐謬悠而笑之中士聞道與之存亡出沒而疑之惟了然見之者然後勤行服膺而不怠孔子曰語之而不惰者其回也與斯所謂上士也哉故建言者有之建立也古之立言者有是説而老子取之下之所陳者是也明道若昧無所不照而非察也進道若退若止不行而天下之速者莫之或先也夷道若𩔖或夷或𩔖所至則平而未甞削也上德若谷上德不德如谷之虚也大白若辱使白而不受汙此則不屑不潔之士而非聖人也廣德若不足廣大而不可復加則止于此而已非廣也建德若偷因物之自然而無立者外若偷惰而實建也質眞若渝體聖抱神隨物變化而不失其貞者外若渝也大方無隅全其大方不小立圭角也大器晚成器大不可近用也大音希聲非耳之所得聞也大象無形非目之所得見也道隱無名夫唯道善貸且成道之所寓無所不見凡此十二者皆道之見于事者也而道之大全則隱于無名惟其所寓推其有餘以貸不足物之頼之以成者如此道生一章第四十二道生一一生二二生三三生萬物萬物負隂而抱陽沖氣以為和夫道非一非二及其與物為偶道一而物不一故以一名道然而道則非一也一與一為二二與一為三自是以徃而萬物生物雖有萬不同而莫不負隂抱陽沖氣以為和者蓋物生于三而三生于一理之自然也人之所惡唯孤寡不穀而王公以為稱世之人不知萬物之所自生莫不賤寡小而貴重大然王公之尊而自稱孤寡不穀古之達者蓋巳知之矣故或損之而益或益之而損人之所教我亦教之强梁者不得其死吾將以為教父天下之至柔章第四十三天下之至柔馳騁天下之至堅無有入無間吾是以知無為之有益以堅御堅不折則碎以柔御堅柔亦不靡堅亦不病求之于物則水是也以有入有捍不相受以無入有無未甞勞有未甞覺求之于物則鬼神是也是以聖人唯能無為故能役使衆强出入羣有不言之教無為之益天下希及之名與身章第四十四名與身孰親身與貨孰多先身而後名貴身而賤貨猶未為忘我也忘我者身不有而況于名與貨乎然貴以身為天下非忘我不能故使天下知名之不足親貨之不足多而後知貴身知貴身而後知忘我此老子之意也得與亡孰病不得者以亡為病及其既得而患失則病又有甚于亡者惟齊有無均得喪而後無病也甚愛必大費多藏必厚亡愛甚則凡可以求之者無所不為能無費乎藏之多則攻之者必衆能無亡乎知足不辱知止不殆可以長久大成若缺章第四十五大成若缺其用不弊大盈若沖其用不窮天下以不缺為成故成必有弊以不虚為盈故盈必有窮聖人要于大成而不䘏其缺期于大盈而不惡其冲是以成而不弊盈而不窮也大直若屈大巧若拙大辯若訥直而不屈其直必折循理而行雖曲而直巧而不拙其巧必勞付物自然雖拙而巧辯而不訥其辯必窮因理而言雖訥而辯躁勝寒靜勝熱清淨為天下正成而不缺盈而不沖直而不屈巧而不拙辯而不訥譬如躁之不能靜靜之不能躁耳夫躁能勝寒而不能勝熱靜能勝熱而不能勝寒皆滯于一偏而非其正也唯泊然清淨不染于一非成非缺非盈非沖非直非屈非巧非拙非辯非訥而後無所不勝可以為天下正矣天下有道章第四十六天下有道却走馬以糞天下各安其分則不爭而自治故却走馬而糞田天下無道戎馬生于郊罪莫大于可欲禍莫大于不知足咎莫大于欲得以其可欲者示人固有罪矣而不足其足者其禍又甚所欲必得者其咎最大匹夫有一于身患必及之侯王而為是則戎馬之所自起也故知足之足常足知足者所寓而足故無不足也不出户章第四十七不出户知天下不窺牖見天道其出彌逺其知彌少性之為體充徧宇宙無逺近古今之異古之聖人其所以不出户牖而無所不知者特其性全故耳世之人為物所蔽性分于耳目内為身心之所紛亂外為山河之所障塞見不出視聞不出聽户牖之微能蔽而絶之不知聖人復性而足乃欲出而求之是以彌逺而彌少也是以聖人不行而知不見而名不為而成性之所及非特能知能名而已蓋可以因物之自然不勞而成之矣為學日益章第四十八為學日益不知道而務學聞見日多而無以一之未免為累也孔子曰多聞擇其善者而從之多見而識之知之次也為道日損茍一日知道顧視萬物無一非妄去妄以求復性是謂之損孔子謂子貢曰女以予為多學而識之者與曰然非與曰非也予一以貫之損之又損以至于無為無為而無不為去妄以求復性可謂損矣而去妄之心猶存及其兼忘此心純性而無餘然後無所不為而不失于無為矣取天下常以無事及有事不足以取天下人皆有欲取天下之心故造事而求之心見于外而物惡之故終不可得聖人無為故無事其心見于外而物安之雖不取天下而天下歸之矣聖人無常心章第四十九聖人無常心以百姓之心為心善者吾善之不善者吾亦善之德善信者吾信之不信者吾亦信之德信虚空無形因萬物之形以為形在方為方在圓為圓如使空自有形則何以形萬物哉是以聖人無心因百姓之心以為心無善不善皆善之無信不信皆信之善不善在彼吾之所以善之者未甞渝也可謂徳善矣信不信在彼而吾之所以信者未甞變也可謂德信矣不然善善而棄不善信信而棄不信豈所謂常善救人故無棄人哉聖人在天下惵惵為天下渾其心百姓皆注其耳目聖人皆孩之天下善惡信偽方各自是以相非相賊不知所定聖人憂之故惵惵為天下渾其心無善惡無信偽皆以一待之彼方注其耳目以觀聖人之與奪而吾一以孾兒遇之于善無所喜于惡無所嫉夫是以善者不矜惡者不慍釋然皆化而天下始定矣出生入死章第五十出生入死性無生死出則為生入則為死生之徒十有三死之徒十有三人之生動之死地亦十有三用物取精以自滋養者生之徒也聲色臭味以自戕賊者死之徒也二者既分生死之道矣吾又知作而不知休知言而不知黙知思而不知忘以于盡則所謂動而之死地者也生死之道以十言之三者各居其三矣豈非生死之道九而不生不死之道一而已矣不生不死則易所謂寂然不動者也老子言其九不言其一使人自得之以寄無思無為之妙也夫何故以其生生之厚有生則有死故生之徒即死之徒也人之所賴于生者厚則死之道常十九蓋聞善攝生者陸行不遇兕虎入軍不避甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地聖人常在不生不死中生地且無焉有死地哉道生之章第五十一道生之德畜之物形之勢成之道者萬物之母故生萬物者道也及其運而為徳牧養羣衆而不辭故畜萬物者徳也然而道德則不能自形因物而後形見物則不能自成逺近相取剛柔相交積而為勢而後興亡治亂之變成矣是以萬物莫不尊道而貴徳形雖由物成雖由勢而非道不生非德不畜是以尊道而貴德尊如父兄貴如侯王道無位而德有名故也道之尊德之貴夫莫之命一作爵而常自然恃爵而後尊貴者非實尊貴也故道生之德畜之長之育之成之熟之養之覆之生而不有為而不恃長而不宰是謂𤣥德天下有始章第五十二天下有始以為天下母無名天地之始有名萬物之母道方無名則物之所資始也及其有名則物之所資生也故謂之始又謂之母其子則萬物也既知一作得其母復一作以知其子既生其子復守其母沒身不殆聖人體道以周物譬如以母知其子了然無不察也雖其智能周之然而未甞以物忘道故終守其母也塞其兑閉其門終身不勤開其兑濟其事終身不救天下皆具此道然常患忘道而徇物目悦于色耳悦于聲開其悦之之心而以其事濟之是以終身而陷溺不能救夫聖人之所以終身不勤者唯塞而閉之未甞出而徇之也見小曰明悦之為害始小而浸大知小之將大而閉之可謂明矣守柔曰强趨其所悦而不顧自以為强而非强也唯見悦而知畏之者可謂强矣用其光復歸其明無遺身殃是謂習一作襲常世人開其所悦以身徇物往而不反聖人塞而閉之非絶物也以神應物用其光而已身不與也夫耳之能聽目之能見鼻之能臭口之能甞身之能觸心之能思皆所謂光也蓋光與物接物有去而明無損是以應萬變而不窮殃不及于其身故其常性湛然相襲而不絶矣使我介然章第五十三使我介然有知行于大道唯施是畏體道者無知無行無所施設而物自化今介然有知而行于大道則有施設建立非其自然有足畏者矣大道甚夷而民好徑大道夷易無有險阻世之不知者以為迂逺而好徑以求捷故凢舍其自然而有所施設者皆欲速者也朝甚除田甚蕪倉甚虚服文綵𢃄利劍厭飲食財貨有餘是謂盜夸非道哉俗人昭昭我獨若昏俗人察察我獨悶悶豈復飾末廢本以施設為事夸以誨盜哉善建不拔章第五十四善建者不拔善抱者不脱子孫祭祀不輟世豈有建而不拔抱而不脱者乎唯聖人知性之眞審物之妄捐物而脩身其徳充積實無所立而其建有不可拔者實無所執而其抱有不可脱者故至其子孫猶以祭祀不輟也脩之于身其德乃眞脩之于家其德有餘脩之于鄉其德乃長脩之于邦其德乃豐脩之于天下其德乃普身既脩推其餘以及外雖至于治天下可也故以身觀身以家觀家以鄉觀鄉以邦觀邦以天下觀天下吾何以知天下之然哉以此天地外者世俗所不見矣然其理可推而知也脩身之至以身觀身以家觀家以鄉觀鄉以邦觀邦皆吾之所及知也然安知聖人以天下觀天下亦若吾之以身觀身乎豈身可以身觀而天下獨不可以天下觀乎故曰吾何以知天下之然哉以此言亦以身知之耳含德之厚章第五十五含德之厚比于赤子老子之言道德每以孾兒況之者皆言其體而已未及其用也夫孾兒泊然無欲其體則至矣然而物來而不知應故未可以言用也毒蟲不螫猛獸不據攫鳥不搏道無形體物莫得而見也況可得而傷之乎人之所以至于有形者由其有心也故有心而後有形有形而後有敵敵立而傷之者至矣無心之人物無與敵者而曷由傷之夫赤子所以至此者唯無心也骨弱筋柔而握固未知牝牡之合而䘒作精之至也無執而自握無欲而自作是以知其精有餘而非心也終日號而嗌不嗄和之至也心動則氣傷氣傷則號而啞終日號而不啞是以知其心不動而氣和也知和曰常和者不以外傷内也復命曰常遇物而知反其本者也知和曰常得本以應萬物者也其實一道也故皆謂之常知常曰明益生曰祥生不可益而欲益之則非其正矣祥妖也心使氣曰强氣惡妄作而又以心使之則强梁甚矣物壯將老謂之不道不道早已益生使氣不能聽其自然日入于剛强而老從之則失其赤子之性矣知者不言章第五十六知者不言言者不知塞其兑閉其門挫其鋭解其紛和其光同其塵是謂𤣥同道非言説亦不離言説然能知者未必言能言者未必知唯塞兑閉門以杜其外挫鋭解紛和光同塵以治其内者黙然不同而與道同也故不可得而親亦不可得而踈不可得而利亦不可得而害不可得而貴亦不可得而賤故為天下貴可得而親則亦可得而踈可得而利則亦可得而害可得而貴則亦可得而賤體道者均覆萬物而孰為親踈等觀逆順而孰為利害不知榮辱而孰為貴賤情計之所不及此所以為天下貴也以正治國章第五十七以正治國以奇用兵以無事取天下古之聖人柔逺能邇無意于用兵唯不得已然後有征伐之事故以治國為正以用兵為奇雖然此亦未足以取天下天下神器不可為也為者敗之執者失之唯體道者廓然無事雖不取天下而天下歸之矣吾何以知其然哉以此天下多忌諱而民彌貧人王多忌諱下情不上達則民貧而無告民多利器國家滋昏利器權謀也明君在上常使民無知無欲民多權謀則其上眩而昏矣人多技巧奇物滋起人不務本業而趨末技則非常無益之物作矣法令滋彰盜賊多有患人之詐偽而多為法令以勝之民無所措手足則日入于盜賊矣故聖人云我無為而民自化我好靜而民自正我無事而民自富我無欲而民自朴其政悶悶章第五十八其政悶悶其民醇醇其政察察其民缺缺禍兮福之所倚福兮禍之所伏孰知其極其無止正復為奇善復為妖人之迷其日固久天地之大世俗之見有所眩而不知也蓋福倚于禍禍伏于福譬如老穉生死之相繼未始有止而迷者不知也夫惟聖人出于萬物之表而攬其終始得其大全而遺其小察視之悶悶若無所明而其民醇醇各全其性矣若夫世人不知道之全體以耳目之所知為至彼方且自以為福而不知禍之伏于後方且自以為善而不知妖之起于中區區以察為明至于察甚傷物而不悟其非也可不哀哉是以聖人方而不割廉而不劌直而不肆光而不耀知小察之不能盡物是以雖能方能廉能直能光而不用其能恐其陷于一偏而不反也此則世俗所謂悶悶也治人事天章第五十九治人事天莫若嗇夫惟嗇是謂早服早服謂之重積德重積徳則無不剋無不剋則莫知其極莫知其極可以有國有國之母可以長久凡物方則割廉則劌直則肆光則耀唯聖人方而不割廉而不劌直而不肆光而不耀此謂嗇也夫嗇者有而不用者也世患無以服人茍誠有而能嗇雖未甞與物較而物知其非不能也則其服之早矣物既已服斂藏而用至于沒身而終不試則徳重積矣徳積既厚雖天下之剛强無不能剋則物莫測其量矣如此而後可以有國彼世之小人有尺寸之柄而輕用之一試不服天下測知其深淺而爭犯之雖欲保其國家不可得也吾是以知嗇之可以有國可以有國則有國之母也是謂深根固長生久視之道孟子曰存其心養其性所以事天也以嗇治人則可以有國者是也以嗇事天則深根固者是也古之聖人保其性命之常不以外耗内則根深而不可拔固而不可脱雖以長生久視可也蓋治人事天雖有内外之異而莫若嗇則一也治大國章第六十治大國若烹小鮮烹小鮮者不可撓治大國者不可煩煩則人勞撓則魚爛以道莅天下其鬼不神聖人無為使人各安其自然外無所煩内無所畏則物莫能侵雖鬼無所用神矣非其鬼不神其神不傷人非其神不傷人聖人亦不傷人非其鬼之不神亦有神而不傷人耳非神之不傷人聖人未甞傷人故其鬼無能為耳夫兩不相傷故徳交歸焉人鬼所以不相傷者由上有聖人耳故德交歸之大國者下流章第六十一大國者下流天下之歸大國猶衆水之趨下流也天下之交天下之牝牝常以靜勝牡以靜為下衆動之赴靜猶泉髙之赴下也故大國以下小國則取小國小國以下大國則取大國大國能下則小國附之小國能下則大國納之故或下以取或下而取大國下以取人小國下而取于人大國不過欲兼畜人小國不過欲入事人夫兩者各得其所欲大者宜為下道者萬物之奥章第六十二道者萬物之奥善人之寶不善人之所保美言可以市尊行可以加人人之不善何棄之有凡物之見于外者皆其門堂也道之在物譬如其奥物皆有之而人莫之見耳夫賢者得而有之故曰善人之寶愚者雖不能有然而非道則不能安也故曰不善人之所保盖道不逺人而人則逺之今誠有人美言之則可以為市于世尊行之則可以加于人矣朝為不義而夕聞大道妄盡而性復雖欲指不善不可得也而又安可棄之哉故立天子置三公雖有拱璧以先駟馬不如坐進此道立天子置三公將以道救人耳雖有拱璧之貴駟馬之良而進之不如進此道之多也古之所以貴此道者何也不曰求以得有罪以免耶故為天下貴道本在我人患不求求則得之矣道無功罪人患不知知則凡罪不能汙也為無為章第六十三為無為事無事味無味大小多少報怨以德聖人為無為故無所不為事無事故無所不事味無味故無所不味其于大小多少一以道遇之而已蓋人情之所不忘者怨也然及其愛惡之情忘則雖報怨猶報徳也圖難于其易為大于其細天下難事必作于易天下大事必作于細是以聖人終不為大故能成其大夫輕諾必寡信多易必多難是以聖人猶難之故終無難世人莫不畏大而侮小難多而易少至于難而後圖大而後為則事常不濟矣聖人齊大小一多少無所不畏無所不難而安有不濟者哉其安易持章第六十四其安易持其未兆易謀其脆易破其微易散為之于未有治之于未亂方其未有持而謀之足矣及其將然非泮而散之不去也然猶愈于既成也故為之于未有者上也治之于未亂者次也合抱之木生于毫末九層之臺起于累土千里之行始于足下為者敗之執者失之聖人無為故無敗無執故無失治亂禍福之來皆如彼三者積小成大聖人待之以無為守之以無執故能使福自生使禍自亡譬如種苗深耕而厚耔之及秋自穰譬如被盜危坐而熟視之盜將自郤世人不知物之自然以為非為不成非執不留故常與禍爭勝與福生贅是以禍至于不救福至于不成蓋其理然也民之從事常于幾成而敗之愼終如始則無敗事聖人知有為之害不以人助天始終皆因其自然故無不成者世人心存于得喪方事之微猶有不知而聽其自然者及見其幾成而重失之則未有不以為敗之者矣故曰愼終如始則無敗事是以聖人欲不欲不貴難得之貨學不學復衆人之所過以輔萬物之自然而不敢為人皆徇其所欲以傷物信其所學以害理聖人非無欲也欲而不欲故雖欲而不傷于物非無學也學而不學故雖學而不害于理然後内外空明廓然無為可以輔萬物之自然而待其自成矣古之善為章第六十五古之善為道者非以明民將以愚之古之所謂智者知道大全而攬于物之終始乃故足貴也凡民不足以知此而溺于小智以察為明則智之害多矣故聖人以道治民非以明之將以愚之耳蓋使之無知無欲而聽上之所為則雖有過亦小矣民之難治以其智多以智治國國之賊吾以智御人人亦以智應之而上下交相賊矣不以智治國國之福知此兩者亦楷式常知楷式是謂𤣥徳𤣥徳深矣逺矣與物反矣乃至于大順吾之所貴者徳也物之所貴者智也徳與智固相反然智之所順者小而徳之所順者大也江海為百谷王章第六十六江海所以能為百谷王者以其善下之故能為百谷王是以聖人欲上民必以言下之欲先民必以身後之聖人非欲上人非欲先人也蓋下之後之其道不得不上且先耳是以聖人處上而民不重處前而民不害是以天下樂推而不厭以其不爭故天下莫能與之爭天下皆謂章第六十七天下皆謂我大似不肖夫惟大故似不肖若肖久矣其細夫道曠然無形頽然無名徧萬物而與物無一相似此其所以為大也若似于物則亦一物耳而何足大哉夫我有三寶持而寶之一曰慈二曰儉三曰不敢為天下先道以不似物為大故其運而為徳則亦悶然以鈍為利以退為進不合于世俗今夫世俗貴勇敢尚廣大誇進鋭而吾之所寶則慈忍儉約廉退此三者皆世之所謂不肖者也慈故能勇世以勇決為賢而以慈忍為不及事不知勇決之易挫而慈忍之不可勝其終必至于勇也儉故能廣世以廣大蓋物而以儉約為陋不知廣大之易窮而儉約之易足其終必至于廣也不敢為天下先故能成器長世以進鋭為能而以不敢先為恥不知進鋭之多惡于人而不敢先之樂推于世其終卒為器長也蓋朴散而為器聖人用之則為官長自朴成器始有屬有長矣今捨慈且勇捨儉且廣捨後且先死矣勇廣先三者人之所共疾也為衆所疾故常近于死矣夫慈以戰則勝以守則固天將救之以慈衞之以慈衞物物之愛之如父母雖為之効死而不辭故可以戰可以守天之將救是人也則開其心志使之無所不慈無所不慈則物皆為之衞矣善為士章第六十八善為士者不武士當以武為本行之以怯若以武行武則死矣善戰者不怒聖人不得已而後戰若出于怒是以我故殺人也天必殃之善勝敵者不爭以吾不爭故能勝彼之爭若皆出于爭則未必勝矣善用人者為下人皆有相上之心故莫能相為用誠能下之則天下皆吾用也是謂不爭之徳是謂用人之力是謂配天古之極用兵有言章第六十九用兵有言吾不敢為主而為客主造事者也客應敵者也不敢進寸而退尺進者有意于爭者也退者無意于爭者也是謂行無行無意于爭則雖用兵與不用均也攘無臂仍無敵執無兵茍無意于爭則雖在軍旅如無臂可攘無敵可因無兵可執而安有用兵之咎耶禍莫大于輕敵輕敵幾喪吾寶聖人以慈為寶輕敵則輕戰輕戰則輕殺人喪其所以為慈矣故抗兵相加哀者勝矣兩敵相加而吾出于不得已則有哀心哀心見而天人助之雖欲不勝不可得矣吾言甚易知章第七十吾言甚易知甚易行天下莫能知莫能行道之大復性而足而性之妙見于起居飲食之間耳聖人指此以示人豈不易知乎人能體此以應物豈不易行乎然世常患日用而不知知且不能而況行之乎言有宗事有君夫唯無知是以不我知言者道之筌也事者道之迹也使道可以言盡則聽言而足矣可以事見則考事而足矣唯言不能盡事不能見非舍言而求其宗遺事而求其君不可得也蓋古之聖人無思無為而有漠然不自然不自知者存焉此則思慮之不及是以終莫吾知也知我者希則我貴衆人之所能知亦不足貴矣是以聖人被褐懷玉聖人外與人同而中獨異耳知不知章第七十一知不知上不知知病道非思慮之所及故不可知然方其未知則非知無以入也及其既知而存知則病矣故知而不知者上不知而知者病夫唯病病是以不病既不可不知又不可知唯知知為病者久而病自去矣聖人不病以其病病是以不病民不畏威章第七十二民不畏威大威至矣夫性自有威髙明光大赫然物莫能加此所謂大威也人常患溺于衆妄畏生死而憚得喪萬物之威雜然乘之終身惴惴之不暇雖有大威而不自知也茍誠知之一生死齊得喪坦然無所怖畏則大威然見于前矣無狹其所居無厭其所生夫唯不厭是以不厭性之大可以包絡天地彼不知者以四肢九竅為巳也守之而不厭是以見不出視聞不出聽蕞然其甚陋也故教之曰無狹其所居彼知之者知性之大而吾生之狹也則愀然厭之欲脱而不得不知有厭有慕之方圓于物也故教之曰無厭其所生夫唯聖人不狹不厭與人同生而與道同居無廣狹淨穢之辨既不厭生而後知生之無可厭也是以聖人自知不自見自愛不自貴故去彼取此聖人雖自知之而不自見雖自愛之而不自貴以眩人恐人之有厭有慕也厭慕之心未忘則猶有畏也畏去而後大威至也勇于敢章第七十三勇于敢則殺勇于不敢則活此兩者或利或害天之所惡孰知其故是以聖人猶難之勇于敢則死勇于不敢則生此物理之常也然而敢者或以得生不敢者或以得死世遂僥倖其或然而忽其常理夫天道之逺其有一或然者孰知其好惡之所從來哉故雖聖人猶以常為正其于勇敢未甞不難之列子曰迎天意揣利害不如其已患天道之難知是以歴陳之也天之道不爭而善勝不與物爭于一時要于終勝之而已不言而善應天何言哉四時行焉百物生焉未有求而不應者也不召而自來神之格思不可度思矧可射思夫誰召之哉繟然而善謀繟然舒緩若無所營而其謀度非人之所及也天網恢恢疎而不失世以耳目觀天見其一曲而不睹其大全有以善而得禍惡而得福者未有不疑天網之疎而多失也惟能要其終始而盡其變化然後知其恢恢廣大雖疎而不失也民不畏死章第七十四民不畏死柰何以死懼之政煩刑重民無所措手足則常不畏死雖以死懼之無益也若使民常畏死而為奇者吾得執而殺之孰敢民安于政常樂生畏死然後執其詭異亂羣者而殺之孰敢不服哉常有司殺者殺司殺者天也方世之治而有詭異亂羣之人恣行于其間則天之所棄也而吾殺之則是天殺之而非我也夫代司殺者殺是謂代大匠斵夫代大匠斵者希有不傷手矣非天之所殺而吾自殺之是代司殺者殺也代大匠斵則傷其手矣代司殺者殺則及其身矣民之饑章第七十五民之饑以其上食税之多是以饑民之難治以其上之有為是以難治上以有為導民民亦以有為應之故事多而難治民之輕死以其求生之厚是以輕死上以利欲先民民亦爭厚其生故雖死而求利不厭夫唯無以生為者是賢于貴生貴生之極必至于輕死惟無以生為而生自全矣人之生章第七十六人之生也柔弱其死也堅强萬物草木之生也柔脆其死也枯槁故堅强者死之徒柔弱者生之徒沖氣在焉則體無堅强之病至理在焉則事無堅强之累是以兵强則不勝兵以義勝者非强也强而不義其敗必速木强則共木自拱把以上必伐矣强大處下柔弱處上物之常理精者在上麤者在下其精必柔弱其麤必强大天之道章第七十七天之道其猶張弓乎張弓上筋弛弓上角故以況天之抑髙舉下髙者抑之下者舉之有餘者損之不足者與之天之道損有餘而補不足人之道則不然損不足以奉有餘天無私故均人多私故不均孰能有餘以奉天下唯有道者有道者贍足萬物而不辭既以為人已愈有既以予人已愈多非有道者無以堪此是以聖人為而不恃功成而不處其不欲見賢耶為而恃成而處則賢見于世賢見于世則是以有餘自奉也天下柔弱章第七十八天下柔弱莫過于水而攻堅强者莫之能勝其無以易之弱之勝强柔之勝剛天下莫不知莫能行故聖人云受國之垢是謂社稷主受國之不祥是謂天下王正言若反正言合道而反俗俗以受垢為辱受不祥為殃故也和大怨章第七十九和大怨必有餘怨安以為善夫怨生于妄而妄出于性知性者不見諸妄而又何怨乎今不知除其本而欲和其末故外雖和而内未忘也是以聖人執左契而不責于人有徳司契無徳司徹契之有左右所以為信而息爭也聖人與人均有是性人方以妄為常馳騖于爭奪之塲而不知性之未始少妄也是以聖人以其性示人使知除妄以復性待其妄盡而性復未有不廓然自得如右契之合左不待責之而自服也然則雖有大怨懟將渙然氷解知其本非有矣而安用和之彼無徳者乃欲人人而通之則亦勞而無功矣徹通也天道無親常與善人天道無私惟善人則與之契之無私也小國寡民章第八十小國寡民老子生于衰周文勝俗弊將以無為救之故于書之終言其所志願得小國寡民以試焉而不可得耳使有什伯人之器而不用民各安其分則小有材者不求用于世什伯人之器則材堪什夫伯夫之長者也使民重死而不逺徙雖有舟轝無所乘之雖有甲兵無所陳之使民復結繩而用之事少民朴雖結繩足矣甘其食美其服安其居樂其俗内足而外無所慕故以其所有為美以其所處為樂而不復求也鄰國相望鷄狗之聲相聞民至老死不相徃來民物繁夥而不相求則彼此皆足故也信言不美章第八十一信言不美美言不信信則為實而已故不必美美則為觀而已故不必信善者不辯辯者不善以善為主則不求辯以辯為主則未必善知者不博博者不知有以一貫之則無所用博博學而日益者未必知道也聖人不積旣以為人已愈有旣以與人已愈多聖人抱一而已他無所積也然施其所能以為人推其所有以與人人有盡而一無盡然後知一之為貴也天之道利而不害聖人之道為而不爭勢可以利人則可以害人矣力足以為之則足以爭之矣能利能害而未甞害能為能爭而未甞爭此天與聖人大過人而為萬物宗者也凡此皆老子之所以為書與其所以為道之大略也故于終篇復言之題老子道德經後予年四十有二謫居筠州筠雖小州而多古禪刹四方遊僧聚焉有道全者住黄蘖山南公之孫也行髙而心通喜從予遊甞與予譚道子告之曰子所譚者予于儒書已得之矣全曰此佛法也儒者何自得之予曰不然予忝聞道儒者之所無何苦强以誣之顧誠有之而世莫知耳儒佛之不相通如胡漢之不相諳也子亦何由而知之全曰試為我言其略予曰孔子之孫子思子思之書曰中庸中庸之言曰喜怒哀樂未發謂之中發而皆中節謂之和中也者天下之大本和也者天下之達道也致中和天地位焉萬物育焉此非佛法而何顧所從言之異耳全曰何以言之予曰六祖有言不思善不思惡方云是時也孰是汝本來面目自六祖以來人以此言悟入者大半矣所謂不思善不思惡則喜怒哀樂之未發也蓋中者佛性之異名而和者六度萬行之總目也致中極和而天地萬物生于其間此非佛法何以當之全驚喜曰吾初不知也今而後始知儒佛一法也予笑曰不然天下固無二道而所以治人則異君臣父子之間非禮法則亂知禮法而不知道則世之俗儒不足貴也居山林木食澗飲而心存至道雖為人天師可也而以之治世則亂古之聖人中心行道而不毁法而後可耳全作禮曰此至論也是時予方解老子每出一章輙以示全全輒歎曰皆佛説也予居筠五年而北歸全不久亦化去逮今二十餘年也凡老子解亦時有所刋定未有不與佛法合者時人無可與語思復見全而示之故書之老子之末大觀二年十二月十日子由題予昔南遷海康與子瞻兄邂逅于藤州相從十餘日語及平生舊學子瞻謂予子所作詩傳春秋傳古史三書皆古人所未至惟解老子差若不及予至海康閑居無事凡所為書多所更定乃再録老子書以寄子瞻自是蒙恩歸北子瞻至毗陵得疾不起逮今十餘年竟不知此書于子瞻為可否也政和元年冬得姪邁等所編先公手澤其一曰昨日子由寄老子新解讀之不盡卷廢卷而歎使戰國有此書則無商鞅韓非使漢初有此書則孔老為一使晉宋間有此書則佛老不為二不意老年見此奇特然後知此書當子瞻意然予自居潁川十年之間于此四書復多所刪改以為聖人之言非一讀所能了故毎有所得不敢以前説為定今日以益老自以為足矣欲復質之子瞻而不可得言及于此涕泗而已十二月十一日子由再題老子解卷下
